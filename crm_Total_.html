<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM AOC — Endesa DSGC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
 --blue:#1a6db5;--blue-l:#2280d4;--blue-xl:#e8f1fb;--blue-2:#0e4a82;
 --green:#1a9a5c;--green-l:#e8f8f0;
 --orange:#d96020;--orange-l:#fff3eb;
 --red:#c83030;--red-l:#fff0f0;
 --yellow:#c89000;--yellow-l:#fffbeb;
 --purple:#7040c0;--purple-l:#f5eeff;
 --teal:#1890a0;--teal-l:#e8f8fa;
 --gray-50:#f8f9fa;--gray-100:#f0f2f5;--gray-200:#e4e8ed;--gray-300:#c8d0da;
 --gray-400:#9aabb8;--gray-500:#6a7d8e;--gray-600:#4a5e6e;--gray-700:#2e3e4e;
 --gray-800:#1a2a36;--white:#fff;
 --shadow:0 2px 8px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.12);
 --radius:8px;--sans:'Inter',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-text-size-adjust:100%}
body{background:var(--gray-50);color:var(--gray-700);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
button{cursor:pointer;font-family:var(--sans)}
input,select,textarea{font-family:var(--sans)}
a{color:var(--blue);text-decoration:none}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow)}
.topbar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px;height:56px}
.brand{display:flex;align-items:center;gap:10px;margin-right:8px}
.brand-logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:700;font-size:14px;letter-spacing:-.5px;flex-shrink:0}
.brand-name{font-weight:700;font-size:15px;color:var(--gray-800);line-height:1}
.brand-sub{font-size:10px;color:var(--gray-400);margin-top:1px}
.tab-nav{display:flex;gap:2px;background:var(--gray-100);padding:3px;border-radius:8px}
.tab-btn{padding:5px 14px;border-radius:6px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--gray-500);transition:all .15s;white-space:nowrap}
.tab-btn.on{background:var(--white);color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.spacer{flex:1}
.hdr-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;border:none;transition:all .15s;white-space:nowrap}
.hdr-btn:hover{filter:brightness(.93)}
.hdr-btn-primary{background:var(--blue);color:var(--white);box-shadow:0 2px 6px rgba(26,109,181,.3)}
.hdr-btn-outline{background:var(--white);color:var(--gray-600);border:1px solid var(--gray-200)}
.hdr-btn-ghost{background:transparent;color:var(--gray-500);border:1px solid var(--gray-200)}
.upload-label{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;background:var(--white);color:var(--gray-600);border:1px solid var(--gray-200);cursor:pointer;transition:all .15s}
.upload-label:hover{filter:brightness(.93)}

/* POMODORO */
.pomo-wrap{display:flex;align-items:center;gap:8px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;padding:6px 12px}
.pomo-ring{position:relative;width:36px;height:36px;flex-shrink:0}
.pomo-svg{width:36px;height:36px;transform:rotate(-90deg)}
.pomo-bg{fill:none;stroke:var(--gray-200);stroke-width:3}
.pomo-arc{fill:none;stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .8s linear,stroke .3s}
.pomo-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--gray-700);font-family:var(--mono)}
.pomo-info{display:flex;flex-direction:column;gap:1px}
.pomo-label{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-400)}
.pomo-phase{font-size:11px;font-weight:700;color:var(--gray-700)}
.pomo-btns{display:flex;gap:4px}
.pomo-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--gray-200);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .12s}
.pomo-btn:hover{background:var(--gray-100)}
.pomo-btn.run{background:var(--green);color:var(--white);border-color:var(--green)}
.pomo-btn.run:hover{filter:brightness(.92)}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:20px}

/* CONTROL BAR */
.ctrl{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:180px}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-400);pointer-events:none}
.search-box input{width:100%;padding:8px 10px 8px 32px;border-radius:7px;border:1px solid var(--gray-200);background:var(--white);font-size:12px;color:var(--gray-700);outline:none;transition:border .15s}
.search-box input:focus{border-color:var(--blue)}
.filter-sel{padding:8px 10px;border-radius:7px;border:1px solid var(--gray-200);background:var(--white);font-size:12px;color:var(--gray-600);outline:none;cursor:pointer;font-family:var(--sans)}
.chip-row{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-500);cursor:pointer;transition:all .12s;white-space:nowrap}
.chip.on{background:var(--blue);color:var(--white);border-color:var(--blue)}

/* MES SELECTOR */
.mes-nav{display:flex;align-items:center;gap:0;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:10px;padding:3px;overflow-x:auto;margin-bottom:8px;scrollbar-width:none}
.mes-nav::-webkit-scrollbar{display:none}
.mes-nav-btn{display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 14px;border-radius:7px;border:none;background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:var(--sans)}
.mes-nav-btn:hover{background:var(--white)}
.mes-nav-btn.on{background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.mes-nav-btn .mes-name{font-size:12px;font-weight:600;color:var(--gray-500);transition:color .15s}
.mes-nav-btn .mes-count{font-size:10px;font-weight:700;color:var(--gray-400);transition:color .15s}
.mes-nav-btn.on .mes-name{color:var(--blue)}
.mes-nav-btn.on .mes-count{color:var(--blue)}
.mes-nav-btn.all-btn .mes-name{color:var(--gray-600)}
.mes-nav-btn.all-btn.on .mes-name{color:var(--blue)}
.mes-sep{width:1px;height:24px;background:var(--gray-200);flex-shrink:0;margin:0 2px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--white);border:1px solid var(--gray-200);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:3px}
.stat-val{font-size:22px;font-weight:700;line-height:1;color:var(--gray-800)}
.stat-lbl{font-size:10px;font-weight:600;color:var(--gray-400);letter-spacing:.06em;text-transform:uppercase}
.stat-sub{font-size:10px;color:var(--gray-400)}

/* CARDS GRID */
.cards{display:grid;gap:10px}
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:10px;overflow:hidden;transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--gray-300)}
.card.urgent{border-color:#fca070;box-shadow:0 0 0 2px #fca07022}
.card.lost{opacity:.55}
.card-stripe{height:3px}
.card-body{padding:14px 16px}
.card-r1{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-company{font-size:14px;font-weight:700;color:var(--gray-800);line-height:1.2;letter-spacing:-.01em}
.card-meta{display:flex;gap:8px;margin-top:3px;align-items:center;flex-wrap:wrap}
.card-meta span{font-size:11px;color:var(--gray-400)}
.card-meta .cm{color:var(--teal);font-weight:600}
.urg-badge{text-align:right;flex-shrink:0}
.urg-val{font-size:12px;font-weight:700;font-family:var(--mono)}
.urg-lbl{font-size:9px;color:var(--gray-400);margin-top:1px}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.sit-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.sit-b{padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;border:1px solid var(--gray-200);background:transparent;color:var(--gray-400);transition:all .1s;font-family:var(--sans);letter-spacing:.04em}
.sit-b.on{color:var(--white)}
.sit-b:hover{opacity:.8}
.notas-txt{font-size:11px;color:var(--gray-400);line-height:1.5;overflow:hidden;cursor:pointer;transition:max-height .2s;font-family:var(--mono);margin-bottom:8px}
.card-actions{display:flex;gap:6px;align-items:center}
.act-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid;text-decoration:none;transition:opacity .15s;font-family:var(--sans);background:transparent}
.act-btn:hover{opacity:.75}
.icon-btn{background:transparent;border:none;padding:5px;color:var(--gray-300);transition:color .15s;line-height:0;border-radius:5px}
.icon-btn:hover{color:var(--gray-600);background:var(--gray-100)}
.empty{text-align:center;padding:60px 20px}
.empty-icon{width:48px;height:48px;background:var(--gray-100);border-radius:12px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.empty-t{font-size:14px;font-weight:600;color:var(--gray-600);margin-bottom:6px}
.empty-s{font-size:12px;color:var(--gray-400)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,25,40,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--white);z-index:5}
.modal-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:3px}
.modal-title{font-size:18px;font-weight:700;color:var(--gray-800);letter-spacing:-.01em}
.modal-body{padding:20px 24px;display:grid;gap:14px}
.flbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-500);margin-bottom:5px;display:block}
.finp{width:100%;padding:9px 12px;border-radius:7px;border:1px solid var(--gray-200);background:var(--white);font-size:13px;color:var(--gray-800);outline:none;transition:border .15s;font-family:var(--sans)}
.finp:focus{border-color:var(--blue);box-shadow:0 0 0 3px #1a6db512}
.finp::placeholder{color:var(--gray-300)}
select.finp{cursor:pointer}
textarea.finp{resize:vertical;min-height:72px;line-height:1.6}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.divider{height:1px;background:var(--gray-100)}
.form-pills{display:flex;gap:6px;flex-wrap:wrap}
.fp-btn{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-500);cursor:pointer;transition:all .12s;font-family:var(--sans)}
.fp-btn:hover{border-color:var(--gray-400);color:var(--gray-700)}
.info-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;margin-top:5px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:14px 24px;border-top:1px solid var(--gray-100);position:sticky;bottom:0;background:var(--white)}
.btn-save{padding:10px 24px;background:var(--blue);color:var(--white);border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--sans);box-shadow:0 2px 8px rgba(26,109,181,.3);transition:all .15s}
.btn-save:hover{background:var(--blue-2)}
.btn-cancel{padding:10px 16px;background:transparent;color:var(--gray-500);border:1px solid var(--gray-200);border-radius:8px;font-size:13px;font-weight:500;font-family:var(--sans);transition:all .15s}
.btn-cancel:hover{background:var(--gray-50)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:9px;font-size:12px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:2000;white-space:nowrap;transition:opacity .3s;font-family:var(--sans)}
.toast.ok{background:#1a9a5c;color:var(--white)}
.toast.err{background:var(--red);color:var(--white)}
.toast.info{background:var(--gray-800);color:var(--white)}

/* POMO OVERLAY */
.pomo-break-overlay{position:fixed;inset:0;background:rgba(26,109,181,.92);display:flex;align-items:center;justify-content:center;z-index:3000;opacity:0;pointer-events:none;transition:opacity .4s}
.pomo-break-overlay.show{opacity:1;pointer-events:all}
.pomo-break-box{text-align:center;color:var(--white)}
.pomo-break-emoji{font-size:56px;margin-bottom:16px}
.pomo-break-title{font-size:28px;font-weight:700;margin-bottom:8px}
.pomo-break-sub{font-size:15px;opacity:.8;margin-bottom:24px}
.pomo-break-btn{padding:12px 28px;background:var(--white);color:var(--blue);border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans)}

@media(max-width:700px){
 .stats{grid-template-columns:repeat(3,1fr)}
 .g3{grid-template-columns:1fr 1fr}
 .brand-sub,.pomo-info,.pomo-btns{display:none}
 .topbar-inner{gap:8px}
}

/* RENDIMIENTO */
.perf-panel{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.perf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;cursor:pointer}
.perf-title{font-size:12px;font-weight:700;color:var(--gray-700);letter-spacing:.02em;display:flex;align-items:center;gap:7px}
.perf-toggle{font-size:10px;color:var(--gray-400);flex-shrink:0}
.perf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.perf-card{border-radius:9px;padding:11px 13px;border:1px solid var(--gray-200);transition:all .2s}
.perf-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-bottom:6px}
.perf-vals{display:flex;align-items:baseline;gap:4px;margin-bottom:7px}
.perf-actual{font-size:20px;font-weight:800;line-height:1}
.perf-target{font-size:11px;color:var(--gray-400);font-weight:500}
.perf-bar-wrap{height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden}
.perf-bar{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.perf-pct{font-size:10px;font-weight:600;margin-top:5px}
.perf-com-sel{font-size:11px;padding:4px 8px;border:1px solid var(--gray-200);border-radius:6px;background:var(--white);color:var(--gray-600);outline:none;cursor:pointer;font-family:var(--sans);margin-left:4px}

/* ── VISITAS SUBTABS ── */
.v-subtabs{display:flex;gap:2px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:8px;padding:3px;margin-bottom:12px}
.v-stab{padding:6px 14px;border-radius:6px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:all .15s;font-family:var(--sans)}
.v-stab.on{background:var(--white);color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* ── RATIO VISITAS ── */
.vperf-panel{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:14px 16px;margin-bottom:14px}

/* ── PLANIFICADOR SEMANAL ── */
.planner{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;overflow:hidden}
.planner-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--gray-100)}
.planner-title{font-size:13px;font-weight:700;color:var(--gray-800)}
.planner-nav-btn{padding:6px 12px;border:1px solid var(--gray-200);border-radius:6px;background:var(--white);font-size:11px;font-weight:600;color:var(--gray-500);cursor:pointer;font-family:var(--sans);transition:all .12s}
.planner-nav-btn:hover{background:var(--gray-50);color:var(--blue)}
.planner-grid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--gray-100)}
.planner-day{border-right:1px solid var(--gray-100);min-height:120px}
.planner-day:last-child{border-right:none}
.planner-day-hdr{padding:8px 10px;border-bottom:1px solid var(--gray-100);position:sticky;top:0;background:var(--white);z-index:1}
.planner-day-name{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400)}
.planner-day-num{font-size:17px;font-weight:800;color:var(--gray-700);line-height:1.1}
.planner-day.today .planner-day-num{color:var(--blue)}
.planner-day.today .planner-day-hdr{background:var(--blue-xl)}
.planner-visit-chip{margin:4px 6px;padding:5px 8px;border-radius:6px;font-size:10px;font-weight:600;border-left:3px solid;cursor:pointer;transition:opacity .12s;line-height:1.3}
.planner-visit-chip:hover{opacity:.75}
.planner-add-btn{margin:4px 6px;padding:5px 8px;border:1px dashed var(--gray-200);border-radius:6px;font-size:10px;color:var(--gray-300);cursor:pointer;text-align:center;background:transparent;font-family:var(--sans);width:calc(100% - 12px);transition:all .12s}
.planner-add-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-xl)}

/* ── REGISTRO RÁPIDO FAB ── */
.fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#12a0aa);border:none;box-shadow:0 4px 16px rgba(24,144,160,.4);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:150;transition:transform .2s,box-shadow .2s}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(24,144,160,.5)}
.fab svg{color:var(--white)}
.fab-label{position:absolute;right:60px;background:var(--gray-800);color:var(--white);font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.fab:hover .fab-label{opacity:1}

/* ── HISTORIAL CLIENTE ── */
.hist-overlay{position:fixed;inset:0;background:rgba(15,25,40,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:1100;padding:16px}
.hist-modal{background:var(--white);border-radius:14px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.hist-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--white)}
.hist-timeline{padding:16px 20px}
.hist-item{display:flex;gap:12px;padding-bottom:16px;position:relative}
.hist-item:not(:last-child)::before{content:'';position:absolute;left:15px;top:28px;bottom:0;width:1px;background:var(--gray-200)}
.hist-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid}
.hist-content{flex:1;padding-top:4px}
.hist-date{font-size:10px;color:var(--gray-400);font-weight:600;margin-bottom:3px}
.hist-res{font-size:12px;font-weight:700;margin-bottom:4px}
.hist-nota{font-size:11px;color:var(--gray-500);line-height:1.5;font-family:var(--mono)}

/* ── CREAR OFERTA DESDE VISITA ── */

.cmp-dash .omie-bars{display:flex;gap:14px;align-items:flex-end;height:100%;position:relative;z-index:1}
.cmp-dash .omie-bar{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:4px}
.cmp-dash .omie-bar .val{font-size:10px;font-weight:700;color:#1A2B3C;margin-bottom:3px;font-family:var(--mono)}
.cmp-dash .omie-bar .bar{width:100%;max-width:56px;background:#888780;border-radius:2px 2px 0 0;min-height:1px}
.cmp-dash .omie-bar .yr{font-size:10px;font-weight:600;color:#5A6878;margin-top:6px}
.cmp-dash .refline{position:absolute;left:8px;right:8px;border-top:1px dashed;z-index:2;pointer-events:none}
.cmp-dash .chart-legend{display:flex;justify-content:flex-end;flex-wrap:wrap;gap:8px 22px;padding:10px 8px 0;font-size:10.5px;font-weight:600}
.cmp-dash .chart-legend .leg-item{display:inline-flex;align-items:center;gap:7px}
.cmp-dash .chart-legend .leg-item i{display:inline-block;width:22px;height:0;border-top:2px dashed}
.cmp-dash .buildup-tbl{width:100%;border-collapse:collapse;font-size:11px}
.cmp-dash .buildup-tbl td{padding:5px 10px;border-bottom:1px solid #EEF2F6}
.cmp-dash .buildup-tbl td.c{color:#1A2B3C}
.cmp-dash .buildup-tbl td.n{font-family:var(--mono);font-weight:600;color:#1A2B3C;text-align:right;font-size:11px}
.cmp-dash .buildup-tbl td.bar{padding:0 10px;width:30%}
.cmp-dash .buildup-tbl td.bar .bv{height:12px;border-radius:2px;min-width:1px}
.cmp-dash .buildup-tbl tr.sumrow td{background:#F0F4F8;font-weight:700;border-top:1px solid #2B6EB4;color:#0E4A82}
.cmp-dash .margin-cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
@media(max-width:640px){.cmp-dash .margin-cmp{grid-template-columns:1fr}}
.cmp-dash .margin-cmp .mb{padding:12px;border-radius:5px;border:1px solid}
.cmp-dash .margin-cmp .mb .t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.cmp-dash .margin-cmp .mb .pmp{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1.1}
.cmp-dash .margin-cmp .mb .mg{font-family:var(--mono);font-size:11px;font-weight:600;margin-top:4px}
.cmp-dash .margin-cmp .mb .nt{font-size:10px;color:#5A6878;line-height:1.5;margin-top:6px}
.cmp-dash .fuente{font-size:9px;color:#98A0AA;line-height:1.5;margin-top:10px;font-style:italic}
.cmp-dash .lectura{display:flex;flex-direction:column;gap:10px}
.cmp-dash .lectura .bl{display:flex;gap:10px;align-items:flex-start}
.cmp-dash .lectura .bl .num{flex-shrink:0;width:22px;height:22px;border-radius:11px;background:#2B6EB4;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;font-family:var(--mono)}
.cmp-dash .lectura .bl .tx{font-size:11px;line-height:1.55;color:#1A2B3C}
.cmp-dash .lectura .bl .tx b{color:#0E4A82}
.cmp-dash .cmp-head-2col{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.cmp-dash .cmp-head-card{background:#F0F4F8;border-radius:5px;padding:10px;text-align:center}
.cmp-dash .cmp-head-card .t{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#5A6878;margin-bottom:4px;font-weight:700}
.cmp-dash .cmp-head-card .v{font-family:var(--mono);font-size:15px;font-weight:700;color:#1A2B3C}
.cmp-dash .cmp-head-card.ok{background:#EAF5EB}
.cmp-dash .cmp-head-card.ok .v{color:#1D9E75}
.cmp-dash .cmp-head-card.bad{background:#FDEAEA}
.cmp-dash .cmp-head-card.bad .v{color:#C83030}
.cmp-dash .dt-tbl{width:100%;border-collapse:collapse;font-size:11px}
.cmp-dash .dt-tbl th{background:#EBF3FB;padding:6px 10px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#2B6EB4;border-bottom:1px solid rgba(43,110,180,.15)}
.cmp-dash .dt-tbl td{padding:5px 10px;font-size:11px;border-bottom:1px solid #EEF2F6}
.cmp-dash .dt-tbl td.n{font-family:var(--mono);text-align:right;font-weight:600}
.cmp-dash .dt-tbl tr.tot{background:#F0F4F8;font-weight:700}
.cmp-dash .dt-tbl tr.tot td{color:#0E4A82;font-size:12px;padding:7px 10px}

@media print {
 .topbar, .tab-nav, .cmp-subtabs, .cmp-form-wrap, .cmp-res-toolbar, .cmp-hist-bar, #panelFunnel, #panelVisitas, #panelImpactos, #panelResumen, #panelRenov, #panelEmbudo, #panelPenalizacion, .pomo-wrap, .content > .ctrl { display: none !important; }
 .content { padding:0; max-width:none }
 .cmp-res-wrap { border: none; padding: 0; margin: 0 }
 .cmp-dash .sec { page-break-inside: avoid }
 @page { size: A4; margin: 12mm }
 body { background: white }
}

</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
 <div class="topbar-inner">

 <div class="brand-logo">E</div>
 <div>

 </div>
 </div>

 </svg>

 </div>

 <!-- Header buttons -->
 <div id="userBadge" style="display:flex;align-items:center;gap:8px;padding:4px 10px;background:#1E3A5F;border-radius:8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer" onclick="localStorage.removeItem('crm-user');location.reload()" title="Cambiar usuario"></div>
 <button id="syncBtn" class="hdr-btn" onclick="IS_JEFE?syncDownload():syncUpload()" style="background:#e8f0fe;color:#1E3A5F;border-color:#1E3A5F40;font-weight:700">↑ Sincronizar</button>

 <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
 Cargar Excel
 <input type="file" id="fileInp" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleImport(event)">
 </label>
 <button class="hdr-btn hdr-btn-outline" onclick="exportExcel()">
 <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
 Descargar
 </button>
 <button class="hdr-btn" id="btnImpactos" onclick="openImpForm()" style="display:none;background:#fff5ee;color:#c86030;border:1px solid #c8603040;font-weight:700">
 <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
 Registrar hoy
 </button>
 <button class="hdr-btn hdr-btn-outline" id="btnNuevaVisita" onclick="openForm('visita', null)" style="color:var(--teal);border-color:#1890a040;background:#e8f8fa">
 <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
 Nueva visita
 </button>
  <button class="hdr-btn hdr-btn-primary" id="btnNuevaOferta" onclick="openForm('funnel', null)">
 <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
 Nueva oferta
 </button>
 </div>
</div>

<!-- CONTENT -->
<div class="content">
 <!-- FUNNEL TAB -->
 <div id="panelFunnel">
 <div class="stats" id="statsFunnel"></div>
 <div class="perf-panel" id="perfPanel">
 <div class="perf-header" onclick="togglePerf()">
 <div class="perf-title">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
 Ratio de desempeño mensual
 </div>
 <span class="perf-toggle" id="perfToggleIcon"> ocultar</span>
 </div>
 <div id="perfBody">
 <div class="perf-grid" id="perfGrid"></div>
 <div id="perfMesInfo" style="font-size:10px;color:var(--gray-400);margin-top:8px;text-align:right"></div>
 <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100)">
  <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-400);margin-bottom:8px">Ratios de conversion</div>
  <div id="ratioConversion" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px"></div>
 </div>
 </div>
 </div>
 <div class="ctrl">
 <div class="search-box">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
 <input type="text" id="fSearch" placeholder="Buscar empresa, comercial, producto..." oninput="render()">
 </div>
 <select class="filter-sel" id="fSort" onchange="render()">
 <option value="urg">Más urgentes primero</option>
 <option value="prob">Mayor probabilidad</option>
 <option value="emp">Nombre A–Z</option>
 <option value="com">Potencial €</option>
 </select>
 </div>
 <div id="fMesChips"></div>
 <div class="chip-row" id="fSitChips" style="margin-bottom:12px"></div>
 <div class="cards" id="cardsFunnel"></div>
 </div>

 <!-- VISITAS TAB -->
 <div id="panelRenov" style="display:none">
  <div class="stats" id="statsRenov"></div>
  <div class="ctrl">
   <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="rSearch" placeholder="Buscar empresa, comercial, producto..." oninput="renderRenov()">
   </div>
   <select class="filter-sel" id="rSort" onchange="renderRenov()">
    <option value="urg">Más urgentes primero</option>
    <option value="prob">Mayor probabilidad</option>
    <option value="emp">Nombre A–Z</option>
    <option value="com">Potencial €</option>
   </select>
  </div>
  <div id="rMesChips"></div>
  <div class="chip-row" id="rSitChips" style="margin-bottom:12px"></div>
  <div class="cards" id="cardsRenov"></div>
 </div>
<div id="panelVisitas" style="display:none">
 <!-- Ratio visitas -->
 <div class="vperf-panel" id="vperfPanel">
 <div class="perf-header">
 <div class="perf-title">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
 Ratio de visitas
 </div>
 <div style="display:flex;align-items:center;gap:8px">
 <div style="display:flex;gap:2px;background:var(--gray-100);padding:2px;border-radius:6px">
 <button class="v-stab on" id="vpt_semana" onclick="setVPerfTab('semana')" style="padding:4px 10px;font-size:10px">Semana</button>
 <button class="v-stab" id="vpt_mes" onclick="setVPerfTab('mes')" style="padding:4px 10px;font-size:10px">Mes</button>
 <button class="v-stab" id="vpt_anual" onclick="setVPerfTab('anual')" style="padding:4px 10px;font-size:10px">Año</button>
 </div>
 <span class="perf-toggle" id="vperfToggle" onclick="toggleVPerf()" style="cursor:pointer"></span>
 </div>
 </div>
 <div id="vperfBody">
 <div class="perf-grid" id="vperfGrid"></div>
 <div id="vperfInfo" style="font-size:10px;color:var(--gray-400);margin-top:8px;text-align:right"></div>
 </div>
 </div>
 <!-- Subtabs -->
 <div class="v-subtabs">
 <button class="v-stab on" id="vstab_lista" onclick="switchVTab('lista')">Lista de visitas</button>
 <button class="v-stab" id="vstab_planner" onclick="switchVTab('planner')">Planificador semanal</button>
 </div>

 <div id="vPanel_lista">
 <div class="stats" id="statsVisitas"></div>
 <div class="ctrl">
 <div class="search-box">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
 <input type="text" id="vSearch" placeholder="Buscar empresa, cliente, población..." oninput="render()">
 </div>
 <select class="filter-sel" id="vSort" onchange="render()">
 <option value="fecha">Más recientes</option>
 <option value="com">Mayor comisión</option>
 <option value="emp">Empresa A–Z</option>
 </select>
 </div>

 <div class="cards" id="cardsVisitas"></div>
 </div><!-- /vPanel_lista -->

 <div class="planner" id="plannerBox"></div>
 </div>
 </div>

 <!-- IMPACTOS TAB -->
 <div id="panelImpactos" style="display:none">
 <div class="imp-panel" id="impPanel"></div>
 </div>

 <!-- RESUMEN MENSUAL TAB -->
 <div id="panelResumen" style="display:none">
 <div class="imp-panel" id="resumenPanel"></div>
 </div>


 <!-- EMBUDO TAB -->
 <div id="panelEmbudo" style="display:none">
  <div id="embudoRoot"></div>
 </div>

 <!-- PANEL COMPARATIVA -->
 <div id="panelComparativa" style="display:none">
  <div class="cmp-subtabs">
   <button class="cmp-stab on" id="cmpTabNueva" onclick="cmpSwitch('nueva')">Nueva comparativa</button>
   <button class="cmp-stab" id="cmpTabHist" onclick="cmpSwitch('historico')">Histórico <span class="cmp-badge" id="cmpHistBadge">0</span></button>
  </div>

  <!-- Sub-vista NUEVA -->
  <div id="cmpSecNueva">
   <div class="cmp-form-wrap" id="cmpFormWrap">
    <!-- Datos cliente -->
    <div class="cmp-card">
     <div class="cmp-card-hd"><span class="cmp-step">01</span><span class="cmp-card-tt">Datos del cliente</span></div>
     <div class="cmp-card-bd">
      <div class="cmp-fg">
       <div class="cmp-f"><label>Razón social</label><input type="text" id="cmp_razon" placeholder="Ej: Interajos SL"></div>
       <div class="cmp-f"><label>CIF / NIF</label><input type="text" id="cmp_cif" placeholder="B-12345678"></div>
       <div class="cmp-f"><label>Nombre contacto</label><input type="text" id="cmp_contacto" placeholder="Juan Pérez"></div>
       <div class="cmp-f"><label>Teléfono</label><input type="text" id="cmp_tel" placeholder="954 123 456"></div>
       <div class="cmp-f"><label>Email</label><input type="email" id="cmp_email" placeholder="contacto@empresa.com"></div>
       <div class="cmp-f"><label>CUPS</label><input type="text" id="cmp_cups" placeholder="ES..."></div>
       <div class="cmp-f cmp-fc"><label>Dirección del suministro</label><input type="text" id="cmp_direccion" placeholder="C/ de la Industria 12, Polígono Las Rozas, Sevilla"></div>
      </div>
     </div>
    </div>

    <!-- Tarifa y mercado -->
    <div class="cmp-card">
     <div class="cmp-card-hd"><span class="cmp-step">02</span><span class="cmp-card-tt">Tarifa ATR y datos de mercado</span></div>
     <div class="cmp-card-bd">
      <div class="cmp-atr-row">
       <label class="cmp-atr-opt"><input type="radio" name="cmp_atr" value="2.0TD" onchange="cmpOnAtrChange()"><span>2.0TD · BT ≤15kW</span></label>
       <label class="cmp-atr-opt cmp-atr-on"><input type="radio" name="cmp_atr" value="3.0TD" checked onchange="cmpOnAtrChange()"><span>3.0TD · BT >15kW</span></label>
       <label class="cmp-atr-opt"><input type="radio" name="cmp_atr" value="6.1TD" onchange="cmpOnAtrChange()"><span>6.1TD · AT (1–30kV)</span></label>
      </div>
      <div class="cmp-mkt-note">Datos de mercado pre-cargados con últimos valores oficiales. Edita si dispones de datos más recientes.</div>
      <div class="cmp-fg">
       <div class="cmp-f"><label>Pool OMIE YTD (€/MWh)</label><input type="number" step="0.01" id="cmp_pool" value="44.18"><span class="cmp-fh">OMIE media acumulada 2026 (ene-mar)</span></div>
       <div class="cmp-f"><label>SAA YTD (€/MWh)</label><input type="number" step="0.01" id="cmp_saa" value="25.00"><span class="cmp-fh">REE servicios de ajuste 2026 YTD</span></div>
       <div class="cmp-f"><label>Fee promedio comercializadora (c€/kWh)</label><input type="number" step="0.1" id="cmp_fee" value="4.0"><span class="cmp-fh">Estándar aplantillado B2B 3.0TD/6.1TD</span></div>
       <div class="cmp-f"><label>Fecha del análisis</label><input type="date" id="cmp_fecha"></div>
      </div>
     </div>
    </div>

    <!-- Energía -->
    <div class="cmp-card">
     <div class="cmp-card-hd"><span class="cmp-step">03</span><span class="cmp-card-tt">Consumo energía (kWh/año) y precios (€/kWh)</span></div>
     <div class="cmp-card-bd">
      <table class="cmp-grid-tbl">
       <thead><tr><th>Periodo</th><th>kWh/año</th><th class="cmp-c-act">Precio actual €/kWh</th><th class="cmp-c-end">Precio Endesa €/kWh</th></tr></thead>
       <tbody id="cmp_ene_rows">
        <tr><td class="cmp-pl">P1</td><td><input type="number" step="1" id="cmp_e_p1_kwh" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p1_pc" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p1_pe" class="cmp-inp-num"></td></tr>
        <tr><td class="cmp-pl">P2</td><td><input type="number" step="1" id="cmp_e_p2_kwh" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p2_pc" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p2_pe" class="cmp-inp-num"></td></tr>
        <tr id="cmp_row_p3"><td class="cmp-pl">P3</td><td><input type="number" step="1" id="cmp_e_p3_kwh" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p3_pc" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p3_pe" class="cmp-inp-num"></td></tr>
        <tr id="cmp_row_p4"><td class="cmp-pl">P4</td><td><input type="number" step="1" id="cmp_e_p4_kwh" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p4_pc" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p4_pe" class="cmp-inp-num"></td></tr>
        <tr id="cmp_row_p5"><td class="cmp-pl">P5</td><td><input type="number" step="1" id="cmp_e_p5_kwh" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p5_pc" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p5_pe" class="cmp-inp-num"></td></tr>
        <tr id="cmp_row_p6"><td class="cmp-pl">P6</td><td><input type="number" step="1" id="cmp_e_p6_kwh" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p6_pc" class="cmp-inp-num"></td><td><input type="number" step="0.0001" id="cmp_e_p6_pe" class="cmp-inp-num"></td></tr>
       </tbody>
      </table>
     </div>
    </div>

    <!-- Potencia -->
    <div class="cmp-card">
     <div class="cmp-card-hd"><span class="cmp-step">04</span><span class="cmp-card-tt">Potencia contratada (kW) y precios (€/kW·día)</span></div>
     <div class="cmp-card-bd">
      <table class="cmp-grid-tbl">

// HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function daysUntil(d){return d?Math.ceil((new Date(d)-new Date())/86400000):null;}
function urgInfo(d){
 if(d===null) return{t:'—',c:'var(--gray-300)',h:0};
 if(d<0) return{t:'VENCIDO',c:'var(--red)',h:3};
 if(d<=30) return{t:d+'d',c:'#d96020',h:3};
 if(d<=90) return{t:d+'d',c:'#c89000',h:2};
 if(d<=180) return{t:d+'d',c:'var(--blue)',h:1};
 return {t:d+'d',c:'var(--gray-300)',h:0};
}
function calcCom(v){
 if(!v||isNaN(v=parseFloat(v))||v<=0)return null;
 if(v<10)return 40;if(v<=20)return 50;if(v<=30)return 84;if(v<=40)return 151;
 if(v<=50)return 156;if(v<=75)return 189;if(v<=100)return 209;if(v<=150)return 251;
 if(v<=200)return 302;if(v<=250)return 335;if(v<=400)return 402;if(v<=500)return 409;
 if(v<=600)return 447;if(v<=800)return 485;return 603;
}
function calcComKwh(kwh){
 const mwh=parseFloat(kwh||0)/1000;
 return mwh>0?calcCom(mwh):null;
}

function getTramo(mwh){
 if(!mwh||mwh<=0)return'—';
 if(mwh<10) return'<10 MWh';
 if(mwh<=20) return'10–20 MWh';
 if(mwh<=30) return'20–30 MWh';
 if(mwh<=40) return'30–40 MWh';
 if(mwh<=50) return'40–50 MWh';
 if(mwh<=75) return'50–75 MWh';
 if(mwh<=100)return'75–100 MWh';
 if(mwh<=150)return'100–150 MWh';
 if(mwh<=200)return'150–200 MWh';
 if(mwh<=250)return'200–250 MWh';
 if(mwh<=400)return'300–400 MWh';
 if(mwh<=500)return'400–500 MWh';
 if(mwh<=600)return'500–600 MWh';
 if(mwh<=800)return'600–800 MWh';
 return'≥800 MWh';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n){return Number(n).toLocaleString('es-ES');}
function mkPill(txt,c,bg){return`<span class="pill" style="background:${bg||c+'14'};border:1px solid ${c}30;color:${c}">${esc(txt)}</span>`;}

function uid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

  html += '<div style="background:var(--blue);color:#fff;padding:14px 18px;margin:-16px -16px 12px;border-radius:10px 10px 0 0">';
  html += '<div style="font-size:17px;font-weight:800">'+esc(empresa)+'</div>';
  if(first.contacto) html += '<div style="font-size:11px;opacity:.8;margin-top:2px">'+esc(first.contacto)+(first.telefono?' · '+first.telefono:'')+'</div>';
  html += '</div>';

  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--gray-100);border-radius:8px;overflow:hidden;margin-bottom:14px">';
  function fk(label,val,col){return '<div style="padding:10px;text-align:center;border-right:1px solid var(--gray-100)"><div style="font-size:20px;font-weight:800;color:'+col+'">'+val+'</div><div style="font-size:9px;color:var(--gray-400);margin-top:2px">'+label+'</div></div>';}
  html += fk('Ofertas',ofertas.length,'var(--blue)');
  html += fk('Firmadas',firmadas.length,'var(--green)');
  html += fk('Perdidas',perdidas.length,'var(--red)');
  html += fk('Total MW',totalMw+' MW','var(--purple)');
  html += '</div>';

  if(ofertas.length){
    html += '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-400);margin-bottom:8px">Historial de ofertas</div>';
    ofertas.slice().reverse().forEach(function(l){
      const col=SIT_C[l.situacion]||'var(--gray-400)';
      html += '<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--gray-50)">';
      html += '<div style="width:7px;height:7px;border-radius:50%;background:'+col+';margin-top:4px;flex-shrink:0"></div>';
      html += '<div><div style="font-size:12px;font-weight:600;color:var(--gray-700)">'+(l.mes||'—')+' <span style="font-size:10px;background:'+col+'20;color:'+col+';padding:1px 6px;border-radius:8px">'+(l.situacion||'')+'</span></div>';
      html += '<div style="font-size:11px;color:var(--gray-400)">'+(l.mw?l.mw+' MW':'')+(l.proveedor?' · '+l.proveedor:'')+(l.tarifa?' · '+l.tarifa:'')+'</div>';
      if(l.notas) html += '<div style="font-size:11px;color:var(--gray-500);font-style:italic">'+esc(l.notas)+'</div>';
      html += '</div></div>';
    });
  }

  if(vis.length){
    html += '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-400);margin:12px 0 8px">Visitas</div>';
    vis.slice().reverse().forEach(function(v){
      html += '<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--gray-50)">';
      html += '<div style="width:7px;height:7px;border-radius:50%;background:var(--teal);margin-top:4px;flex-shrink:0"></div>';
      html += '<div><div style="font-size:12px;font-weight:600;color:var(--gray-700)">'+(v.fechaVisita||v.mes||'—')+' <span style="font-size:10px;color:var(--teal);font-weight:600">'+(v.motivo||'')+'</span></div>';
      html += '<div style="font-size:11px;color:var(--gray-400)">'+(v.resultado||'')+(v.proxAccion?' → '+v.proxAccion:'')+'</div>';
      html += '</div></div>';
    });
  }

  document.getElementById('histTitle').textContent = empresa;
  document.getElementById('histBody').innerHTML = html;
  document.getElementById('histOv').style.display = 'flex';
}


// Tabla de comisiones renovaciones (columna 100%) — MR RNV
function calcComRenov(consumoKwh){
 const mwh = parseFloat(consumoKwh||0) / 1000;
 if(!mwh || mwh<=0) return 0;
 if(mwh < 10)   return 20;
 if(mwh <= 20)  return 25;
 if(mwh <= 30)  return 42;
 if(mwh <= 40)  return 75;
 if(mwh <= 50)  return 78;
 if(mwh <= 75)  return 94;
 if(mwh <= 100) return 105;
 if(mwh <= 150) return 126;
 if(mwh <= 200) return 151;
 if(mwh <= 250) return 168;
 if(mwh <= 400) return 201;
 if(mwh <= 500) return 204;
 if(mwh <= 600) return 223;
 if(mwh <= 800) return 243;
 return 302;
}

 vis.sort((a,b)=>{

 if(l.provincia)  pills+=mkPill(l.provincia,'var(--gray-400)');

    </div>
   </div>
   ${pills?`<div class="pills">${pills}</div>`:''}
   ${kpis?`<div class="pills">${kpis}</div>`:''}
   <div style="display:flex;gap:8px;align-items:center;margin:6px 0 2px;flex-wrap:wrap">

      title="PMP Actual €/kWh">

function openForm(type, id){
 editType=type; editId=id;
 const isFunnel=type==='funnel';
 const isRenov=type==='renov';
 const arr=isFunnel?funnel:isRenov?renovaciones:visitas;
 const rec=id?arr.find(x=>x.id===id):null;
 document.getElementById('fTag').textContent=id?(isFunnel||isRenov?'Editar':'Editar visita'):(isFunnel?'Nueva oferta':isRenov?'Nueva renovación':'Nueva visita');
 document.getElementById('fTitle').textContent=rec?((isFunnel||isRenov)?rec.empresa:rec.razonSocial)||'—':'—';
 document.getElementById('fBody').innerHTML=isRenov?buildRenovForm(rec):isFunnel?buildFunnelForm(rec):buildVisitaForm(rec);
 document.getElementById('fOverlay').style.display='flex';
 if(rec){
  if(isRenov){setSituacionR(rec.situacion||'NO CONTACTADO');}
  else if(isFunnel){setSituacionF(rec.situacion||'SEGUIMIENTO');setProductoF(rec.producto||'');setGanaF(rec.ganaMes||'');}
  else{setResultadoV(rec.resultado||'');setProxAccV(rec.proxAccion||'');}
  updComPreview();
 } else {
  if(isRenov){setSituacionR('NO CONTACTADO');}
  else if(isFunnel){setSituacionF('SEGUIMIENTO');setProductoF('');setGanaF('');}
  else{setResultadoV('');setProxAccV('');}
 }
}

function updComPreview(){

 const el=document.getElementById('f_comInfo');
 if(el){if(com){el.style.display='flex';el.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/></svg>&nbsp;'+fmt(com)+' €';}else el.style.display='none';}
 const pm=PROB_META[document.getElementById('f_probabilidad')?.value];
 const pi=document.getElementById('f_probInfo');
 if(pi){if(pm){pi.style.display='flex';pi.style.background=pm.c+'18';pi.style.border='1px solid '+pm.c+'30';pi.style.color=pm.c;pi.textContent=pm.l;}else pi.style.display='none';}
 } else {
 const kwh=parseFloat(document.getElementById('v_consumoAnual')?.value||0);
 const mwh=kwh/1000;
 const com=mwh>0?calcCom(mwh):null;
 const cc=document.getElementById('v_comCalc');
 if(cc)cc.textContent=com?fmt(com)+' €':'—';
 const mwhEl=document.getElementById('v_mwhCalc');
 if(mwhEl)mwhEl.textContent=kwh>0?fmt(Math.round(mwh))+' MWh → tramo '+getTramo(mwh):'Introduce kWh';
 cc&&(cc.style.color=com?'var(--green)':'var(--gray-400)');
 }
}

function g(id){return document.getElementById(id)?.value?.trim()||'';}

function saveRecord(){
 const isFunnel=editType==='funnel';
 const isRenov=editType==='renov';
 if(isRenov){
  if(!g('r_razonSocial')){showToast('La razón social es obligatoria','err');return;}
  const rec={id:editId||uid(),mes:g('r_mes'),gestor:g('r_gestor'),campana:g('r_campana'),cif:g('r_cif'),razonSocial:g('r_razonSocial'),cp:g('r_cp'),provincia:g('r_provincia'),ps:g('r_ps'),atr:g('r_atr'),consumoAnual:g('r_consumoAnual'),pmpActual:g('r_pmpActual'),pmpOfertado:g('r_pmpOfertado'),quote:g('r_quote'),situacion:g('r_situacion')||'NO CONTACTADO',fechaRenov:g('r_fechaRenov'),notas:g('r_notas')};
  if(editId){const i=renovaciones.findIndex(x=>x.id===editId);if(i>=0)renovaciones[i]=rec;}else renovaciones.push(rec);
 } else if(isFunnel){
  if(!g('f_empresa')){showToast('La empresa es obligatoria','err');return;}
  const rec={id:editId||uid(),mes:g('f_mes'),comercial:g('f_comercial'),empresa:g('f_empresa'),origen:g('f_origen'),fechaCreacion:g('f_fechaCreacion'),fechaCierre:g('f_fechaCierre'),vencimiento:g('f_vencimiento'),contacto:g('f_contacto'),telefono:g('f_telefono'),email:g('f_email'),probabilidad:g('f_probabilidad'),ganaMes:g('f_ganaMes'),mw:g('f_mw'),situacion:g('f_situacion')||'SEGUIMIENTO',proveedor:g('f_proveedor'),tarifa:g('f_tarifa'),producto:g('f_producto'),notas:g('f_notas')};
  const arr=funnel;
  if(editId){const i=arr.findIndex(x=>x.id===editId);if(i>=0)arr[i]=rec;}else arr.push(rec);
 } else {
  if(!g('v_razonSocial')){showToast('La razón social es obligatoria','err');return;}
  const rec={id:editId||uid(),mes:g('v_mes'),fechaVisita:g('v_fechaVisita'),motivo:g('v_motivo'),razonSocial:g('v_razonSocial'),cliente:g('v_cliente'),poblacion:g('v_poblacion'),consumoAnual:g('v_consumoAnual'),telefono:g('v_telefono'),fechaBaja:g('v_fechaBaja'),resultado:g('v_resultado'),proxAccion:g('v_proxAccion'),notas:g('v_notas')};
  if(editId){const i=visitas.findIndex(x=>x.id===editId);if(i>=0)visitas[i]=rec;}else visitas.push(rec);
 }
 save();closeForm();render();
 if(editType==='renov') renderRenov();
 showToast(editId?'Registro actualizado':'Registro añadido','ok');
}

function delRecord(type,id){
 if(!confirm('¿Eliminar este registro? Esta acción no se puede deshacer.'))return;
 if(type==='funnel')funnel=funnel.filter(x=>x.id!==id);
 else if(type==='renov')renovaciones=renovaciones.filter(x=>x.id!==id);
 else visitas=visitas.filter(x=>x.id!==id);
 save();render();if(type==='renov')renderRenov();showToast('Eliminado','info');
}

function handleImport(e){
 const file=e.target.files[0];
 if(!file)return;

function normHeader(h){
 return String(h||'').trim().toLowerCase()
 .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
 .replace(/[^a-z0-9]/g,'');
}

function fmtDate(v){
 if(!v||v==='')return'';
 if(v instanceof Date&&!isNaN(v)) return v.toISOString().split('T')[0];
 const s=String(v).trim();
 if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
 if(s.includes('/')){
 const p=s.split('/');
 if(p.length===3){
 const y=p[2].length===2?'20'+p[2]:p[2];
 return y+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
 }
 }
 // Serial de Excel (nativo, sin XLSX) — ej: 46025 → 2026-01-03
 const n=Number(s);
 if(!isNaN(n)&&n>40000&&n<60000){
   const d=new Date(Math.round((n-25569)*86400000));
   if(!isNaN(d.getTime()))return d.toISOString().split('T')[0];
 }
 return s;
}
function sv(v){return String(v===null||v===undefined?'':v).trim();}

const MESES_NORM=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function normalizeMes(v){
  if(!v) return v;
  const s = String(v).trim();
  // Already correct: "Abril 2026"
  if(/^[A-Za-záéíóúÁÉÍÓÚ]+ \d{4}$/.test(s)) return s;
  // ISO date: "2026-04-01"
  const iso = s.match(/^(\d{4})-(\d{2})/);
  if(iso){ return MESES_NORM[parseInt(iso[2])-1]+' '+iso[1]; }
  // Excel serial
  const n = parseFloat(s);
  if(!isNaN(n) && n>40000 && n<60000){
    const d = new Date(Math.round((n-25569)*86400000));
    if(!isNaN(d.getTime())) return MESES_NORM[d.getMonth()]+' '+d.getFullYear();
  }
  return s;
}

function isSubtitle(row){
 // Solo marcamos como subtítulo si tiene patrones MUY específicos de plantilla
 // NO usamos longitud de texto para no confundir con notas reales
 let hits=0;
 for(const v of row){
 const s=String(v||'').toLowerCase();
 if(s.includes('dd/mm')|| // instrucción de fecha
 s.includes('obligatorio')|| // campo obligatorio
 s==='mes de gestion'||s==='mes de gestión'||
 s==='nombre del comercial'||
 s==='nombre exacto'||
 s==='wf / dsgc'||s.startsWith('wf / ')||
 s==='captar / renovar'||s.startsWith('captar /')||
 s==='nombre fiscal'||
 s==='persona de contacto'||
 s==='ciudad / municipio'||
 s==='consumo electrico'||s==='consumo eléctrico'||
 s.startsWith('calculado automaticamente')||s.startsWith('calculado automáticamente')||
 s==='estado real tras el contacto'||
 s==='paso siguiente con este cliente'
 ) hits++;
 }
 return hits>=2;
}

function parseSheet(ws, type){
 if(!ws||!ws['!ref']) return 0;
 // raw:true → sin formateo, fechas como números serie
 const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});
 if(!rows.length) return 0;

 const MAP=type==='funnel'?F_MAP:V_MAP;

 // Buscar fila de cabeceras (máx primeras 8 filas)
 let hi=-1;
 for(let i=0;i<Math.min(rows.length,8);i++){
 const norms=rows[i].map(normHeader);
 const matched=norms.filter(n=>MAP[n]||IGNORE[n]).length;
 if(matched>=3){hi=i;break;}
 }
 if(hi<0) return 0;

 const headers=rows[hi].map(normHeader);

 // Saltar EXACTAMENTE las filas de subtítulos (solo las que son descripciones)
 let ds=hi+1;
 while(ds<rows.length && isSubtitle(rows[ds])) ds++;

 let count=0;
 const existF=new Set(funnel.map(l=>((l.empresa||'')+(l.mes||'')).toLowerCase()));
 const existV=new Set(visitas.map(v=>((v.razonSocial||'')+(v.mes||'')).toLowerCase()));

 for(let i=ds;i<rows.length;i++){
 const row=rows[i];
 // Fila vacía → saltar
 if(!row||!row.some(x=>x!==''&&x!==null&&x!==undefined&&String(x).trim())) continue;

 const obj={id:uid()};
 headers.forEach((h,idx)=>{
 if(IGNORE[h]) return;
 const k=MAP[h];
 if(!k) return;
 const raw=row[idx];
 const isDate=(type==='funnel'?F_DATES:V_DATES).has(k);
 obj[k]=isDate?fmtDate(raw):sv(raw);
 });

 if(type==='funnel'){
 if(obj.mes) obj.mes=normalizeMes(obj.mes);
 const emp=((obj.empresa||'')+'|'+(obj.mes||'')).toLowerCase();
 if(emp&&!existF.has(emp)){funnel.push(obj);existF.add(emp);count++;}
 } else {
 const rs=((obj.razonSocial||'')+'|'+(obj.mes||'')).toLowerCase();
 if(rs&&!existV.has(rs)){visitas.push(obj);existV.add(rs);count++;}
 }
 }
 return count;
}

function parseCSVLines(lines){
 let hi=lines.findIndex(l=>l.toLowerCase().includes('empresa'));
 if(hi<0) hi=0;
 const sep=lines[hi].includes(';')?';':',';
 const headers=lines[hi].split(sep).map(normHeader);
 let count=0;
 const existF=new Set(funnel.map(l=>(l.empresa||'').toLowerCase()));
 for(let i=hi+1;i<lines.length;i++){
 if(!lines[i].trim()) continue;
 const vals=lines[i].split(sep).map(v=>v.trim().replace(/^"|"$/g,''));
 const obj={id:uid()};
 headers.forEach((h,idx)=>{
 if(IGNORE[h]) return;
 const k=F_MAP[h]||V_MAP[h];
 if(!k) return;
 const isDate=F_DATES.has(k)||V_DATES.has(k);
 obj[k]=isDate?fmtDate(vals[idx]):vals[idx]||'';
 });
 if(obj.empresa&&!existF.has(obj.empresa.toLowerCase())){
 funnel.push(obj); existF.add(obj.empresa.toLowerCase()); count++;
 }
 }
 return count;
}

function normImpLabel(s){
 return String(s||'').toLowerCase()
 .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
 .replace(/[^a-z]/g,'')
 .slice(0,20);
}

function getMondaysOfMonth(mesLabel){
 // "Enero 2026" → array of 4 Monday ISO dates for weeks 1-4
 const MESES_MAP={'enero':0,'febrero':1,'marzo':2,'abril':3,'mayo':4,'junio':5,
 'julio':6,'agosto':7,'septiembre':8,'octubre':9,'noviembre':10,'diciembre':11};
 const parts=mesLabel.trim().split(/\s+/);
 const mes=MESES_MAP[parts[0]?.toLowerCase()];
 const anio=parseInt(parts[1]);
 if(isNaN(mes)||isNaN(anio)) return [];
 
 // Find first Monday of the month
 const d=new Date(anio, mes, 1);
 const dow=d.getDay(); // 0=Sun,1=Mon...
 const daysToMon=dow===0?1:(dow===1?0:8-dow);
 d.setDate(1+daysToMon);
 
 const mondays=[];
 for(let i=0;i<4;i++){
 const dd=new Date(d);
 dd.setDate(d.getDate()+i*7);
 if(dd.getMonth()<=mes) mondays.push(dd.toISOString().split('T')[0]);
 }
 return mondays;
}

function parseImpactosSheet(ws){
 const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});
 if(!rows.length) return 0;

 // Find MES: look for row with cell value matching "MES" in col C (index 2)
 let mesLabel='';
 for(const row of rows){
 const nc=normImpLabel(row[2]);
 if(nc==='mes'&&row[3]){
 mesLabel=String(row[3]).trim();
 break;
 }
 }
 if(!mesLabel){ console.warn('IMPACTOS: no se encontró el MES'); return 0; }
 
 const mondays=getMondaysOfMonth(mesLabel);
 if(!mondays.length){ console.warn('IMPACTOS: no se calcularon lunes para',mesLabel); return 0; }

 loadImp();
 let count=0;

 for(const row of rows){
 const label=normImpLabel(row[2]);
 // Use startsWith to handle labels with suffixes like "(2/día)"
 const fieldKey=IMP_LABEL_MAP[label]||
 Object.entries(IMP_LABEL_MAP).find(([k])=>label.startsWith(k))?.[1];
 if(!fieldKey) continue;
 
 // S1=col G(idx6), S2=H(7), S3=I(8), S4=J(9)
 const sVals=[row[6],row[7],row[8],row[9]];
 sVals.forEach((val,weekIdx)=>{
 const n=parseInt(val||0);
 if(n>0&&mondays[weekIdx]){
 const storeKey=mondays[weekIdx]+'-'+fieldKey;
 impData[storeKey]=n; // SET no ADD
 count++;
 }
 });
 }

 if(count>0){
 saveImp();
 // Store last imported month for auto-navigation
 localStorage.setItem('crm-imp-lastmes', mesLabel);
 return mondays.length;
 }
 return 0;
}


// Parser de resumen mensual que acepta rows[] directamente
function parseResumenFromRows(rows, mesLabel){
 if(!rows||!rows.length) return 0;
 function normL(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');}
 const d={};
 let section='';
 rows.forEach(function(row){
  if(!row) return;
  const lbl=String(row[2]||'').trim();
  const lblN=normL(lbl);
  if(!lbl) return;
  if(lblN==='captacion'){section=section.startsWith('g')?'gcap':'cap';return;}
  if(lblN==='fidelizacion'){section=section.startsWith('g')?'gfid':'fid';return;}
  if(lblN.includes('suministrosdeelectricidad')||lblN==='electricidad'){section='';return;}
  if(lblN.includes('gasnatural')||lblN.includes('suministrosdegasnatural')){section='g';return;}
  const val=parseFloat(row[3]||0)||0;
  let key=null;
  if(lblN==='llamadasweforce'||lblN==='llamadaswf') key='llamWF';
  else if(lblN==='llamadasdsgc') key='llamDSGC';

function parseResumenMensualSheet(ws, mesLabel){
 const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
 if(!rows.length) return 0;

 // Mapa etiqueta (normalizada) → clave interna
 const LABEL_MAP = {
  // Impactos
  'llamadasweforce':'llamWF','llamadaswf':'llamWF',
  'llamadasdsgc':'llamDSGC',
  'visitaswf':'visWF','visitasweforce':'visWF',
  'visitasdsgc':'visDSGC',
  'whatsapp':'wp',
  'marcacionesnc':'marc','marcaciones':'marc',
  'emails':'email',
  // Electricidad captación
  'numerodeofertas_cap':'elecCapOfer',
  'mwhofertados_cap':'elecCapMwhOfer',
  'mwhrechazados_cap':'elecCapMwhRech',
  'numerodeciffirmados':'elecCapCifFirm',
  'numerodepsfirmados':'elecCapPsFirm',
  'mwhfirmas_cap':'elecCapMwhFirm',
  'puntosdcsuministro':'elecCapPs','puntossuministro':'elecCapPs',
  // Electricidad fidelización
  'numerodeofertas_fid':'elecFidOfer',
  'mwhofertados_fid':'elecFidMwhOfer',
  'mwhrechazados_fid':'elecFidMwhRech',
  'numerodecontratosfirmados_fid':'elecFidContrFirm',
  'mwhfirmados_fid':'elecFidMwhFirm',
  // Gas captación
  'numerodeofertas_gcap':'gasCapOfer',
  'mwhofertados_gcap':'gasCapMwhOfer',
  'mwhrechazados_gcap':'gasCapMwhRech',
  'numerodecontratosfirmados_gcap':'gasCapContrFirm',
  'mwhfirmas_gcap':'gasCapMwhFirm',
  // Gas fidelización
  'numerodeofertas_gfid':'gasFidOfer',
  'mwhofertados_gfid':'gasFidMwhOfer',
  'mwhrechazados_gfid':'gasFidMwhRech',
  'numerodecontratosfirmados_gfid':'gasFidContrFirm',
  'mwhfirmados_gfid':'gasFidMwhFirm',
 };

 function normL(s){
  return String(s||'').toLowerCase()
   .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
   .replace(/[^a-z0-9]/g,'');
 }

 const d = {};
 let section = ''; // 'cap' | 'fid' | 'gcap' | 'gfid'
 let inElec = false, inGas = false;

 rows.forEach(function(row){
  if(!row) return;
  const lbl = String(row[2]||'').trim();
  const lblN = normL(lbl);
  if(!lbl) return;

  // Detectar sección
  if(lblN==='captacion'||lblN==='captacion'){
   section = inGas ? 'gcap' : 'cap';
   return;
  }
  if(lblN==='fidelizacion'){
   section = inGas ? 'gfid' : 'fid';
   return;
  }
  if(lblN.includes('electricidad')){ inElec=true; inGas=false; return; }
  if(lblN.includes('gasnatural')||lblN.includes('gas')&&lblN.includes('natural')){ inGas=true; inElec=false; return; }

  // Valor en col D (idx 3) = Total Mes/Año
  const val = parseFloat(row[3]||0)||0;

  // Intentar mapeo directo
  let key = LABEL_MAP[lblN];

  // Si no hay mapeo directo, intentar con sufijo de sección
  if(!key && section){
   key = LABEL_MAP[lblN+'_'+section];
  }

  // Mapeo posicional para etiquetas repetidas (Número de OFERTAS aparece varias veces)
  if(!key){
   if(lblN==='numerodeofertas'){
    if(section==='cap') key='elecCapOfer';
    else if(section==='fid') key='elecFidOfer';
    else if(section==='gcap') key='gasCapOfer';
    else if(section==='gfid') key='gasFidOfer';
   } else if(lblN==='mwhofertados'){
    if(section==='cap') key='elecCapMwhOfer';
    else if(section==='fid') key='elecFidMwhOfer';
    else if(section==='gcap') key='gasCapMwhOfer';
    else if(section==='gfid') key='gasFidMwhOfer';
   } else if(lblN==='mwhrechazados'){
    if(section==='cap') key='elecCapMwhRech';
    else if(section==='fid') key='elecFidMwhRech';
    else if(section==='gcap') key='gasCapMwhRech';
    else if(section==='gfid') key='gasFidMwhRech';
   } else if(lblN==='mwhfirmas'||lblN==='mwhfirmados'){
    if(section==='cap') key='elecCapMwhFirm';
    else if(section==='fid') key='elecFidMwhFirm';
    else if(section==='gcap') key='gasCapMwhFirm';
    else if(section==='gfid') key='gasFidMwhFirm';
   } else if(lblN.includes('contratosfirmados')||lblN.includes('cifirmados')||lblN.includes('psfirmados')){
    if(section==='cap') key=lblN.includes('ps')?'elecCapPsFirm':'elecCapCifFirm';
    else if(section==='fid') key='elecFidContrFirm';
    else if(section==='gcap') key='gasCapContrFirm';
    else if(section==='gfid') key='gasFidContrFirm';
   } else if(lblN.includes('puntossuministro')||lblN.includes('puntosdcsuministro')){
    key='elecCapPs';
   }
  }

  if(key && val!==null) d[key] = val;
 });

 // Si no hay ningún dato útil, devolver 0
 if(Object.keys(d).length === 0) return 0;

 d.mes = mesLabel;

 loadRes();
 const comercial = 'Antonio'; // extraer del sheet si disponible
 if(!resData[comercial]) resData[comercial] = {};
 resData[comercial][mesLabel] = d;
 saveRes();
 return 1;
}

function buildResumenMensualSheet(){
 loadImp(); loadResSem();

 // Use year from resumenMesActivo or current year
 const now = new Date();
 const pts = (resumenMesActivo||'').split(' ');
 const anio = parseInt(pts[1]) || now.getFullYear();

 const MESES_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
 'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

 // ── Data helpers ──────────────────────────────────────────────────────────
 // impData monthly total for a field
 function impMonth(key, mi){
 var t=0;
 Object.keys(impData).forEach(function(k){
 var p=k.split('-');
 if(p.length>=4 && parseInt(p[0])===anio && parseInt(p[1])-1===mi && p.slice(3).join('-')===key)
 t+=parseInt(impData[k]||0);
 });
 return t;
 }

 // resSemData monthly total for a manual key
 function manMonth(key, mi){
 var t=0;
 Object.keys(resSemData).forEach(function(monday){
 var d=new Date(monday+'T12:00:00');
 if(d.getMonth()===mi && d.getFullYear()===anio)
 t+=parseInt((resSemData[monday]&&resSemData[monday][key])||0);
 });
 return t;
 }

 // Funnel for a specific month
 function funnelMonth(mi){
 var mesLabel=MESES_NAMES[mi]+' '+anio;
 var mesPrefix=anio+'-'+String(mi+1).padStart(2,'0');
 return funnel.filter(function(l){
 return l.mes===mesLabel||(l.fechaCreacion&&l.fechaCreacion.startsWith(mesPrefix));
 });

 var total = vals.reduce(function(a,v){return a+v;},0);
 var row = ['','',label,total,...vals];
 if(isTotal) row._isTotal=true;
 return row;
 }

 function dataRowMan(label, key){
 var vals = months.map(function(_,mi){ return manMonth(key,mi); });
 var total = vals.reduce(function(a,v){return a+v;},0);
 return ['','',label,total,...vals];
 }

 function dataRowFunnel(label, fn){
 var vals = months.map(function(_,mi){ return fn(funnelMonth(mi)); });
 var total = vals.reduce(function(a,v){return a+v;},0);

 }, true));

 // ── ELECTRICIDAD ──────────────────────────────────────────────────────────
 rows.push(sHdr('SUMINISTROS DE ELECTRICIDAD'));

  const wkL=mons.map(function(m){return m?'Semana '+wkN(m):'—';});

  // ── datos ────────────────────────────────────────────────────────────────
  function impWk(mon,k){if(!mon)return 0;var t=0;for(var i=0;i<7;i++){var d=new Date(mon+'T12:00:00');d.setDate(d.getDate()+i);t+=parseInt(impData[d.toISOString().split('T')[0]+'-'+k]||0);}return t;}

function calcWeekOffsetForMes(mesLabel){
 // Calculate how many weeks from current week to first Monday of that month
 const MESES_MAP={'enero':0,'febrero':1,'marzo':2,'abril':3,'mayo':4,'junio':5,
 'julio':6,'agosto':7,'septiembre':8,'octubre':9,'noviembre':10,'diciembre':11};
 const parts=mesLabel.trim().split(/\s+/);
 const mes=MESES_MAP[parts[0]?.toLowerCase()];
 const anio=parseInt(parts[1]);
 if(isNaN(mes)||isNaN(anio)) return 0;

 // First Monday of the imported month
 const d=new Date(anio, mes, 1);
 const dow=d.getDay();
 const daysToMon=dow===0?1:(dow===1?0:8-dow);
 d.setDate(1+daysToMon);

 // Current Monday
 const now=new Date();
 const today=now.getDay();
 const curMon=new Date(now);
 curMon.setDate(now.getDate()-(today===0?6:today-1));
 curMon.setHours(0,0,0,0);

 const diffMs=d.getTime()-curMon.getTime();
 return Math.round(diffMs/(7*24*3600*1000));
}

function getWeekDates(off){
 const now=new Date(),day=now.getDay();
 const mon=new Date(now);
 mon.setDate(now.getDate()-(day===0?6:day-1)+off*7);
 return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function getMesImpData(){
 var y, m;
 if(impMesActivo){
 var MMAP = {'enero':0,'febrero':1,'marzo':2,'abril':3,'mayo':4,'junio':5,
 'julio':6,'agosto':7,'septiembre':8,'octubre':9,'noviembre':10,'diciembre':11};
 var pts = impMesActivo.split(' ');
 var mn = MMAP[pts[0]&&pts[0].toLowerCase()];
 m = (mn !== undefined) ? mn : new Date().getMonth();
 y = parseInt(pts[1]) || new Date().getFullYear();
 } else {
 var now = new Date(); y = now.getFullYear(); m = now.getMonth();
 }
 var r = {};
 IMP_COLS.forEach(function(col){ r[col.key] = 0; });
 Object.keys(impData).forEach(function(key){
 var parts = key.split('-');
 if(parts.length >= 3){
 var ky = parseInt(parts[0]), km = parseInt(parts[1])-1;
 var colKey = parts.slice(3).join('-');
 if(ky===y && km===m && r[colKey]!==undefined)
 r[colKey] += parseInt(impData[key]||0);
 }
 });
 r.llamTot = r.llamWF + r.llamDSGC;
 r.visOferta= r.visWF||0; r.visCap = r.visDSGC||0;
 r.impTot = r.llamTot + r.visWF + r.visDSGC + r.wp + r.marc + r.email;
 return r;
}

function getTotalImpData(){
 var r = {};
 IMP_COLS.forEach(function(col){ r[col.key] = 0; });
 Object.keys(impData).forEach(function(key){
 var parts = key.split('-');
 if(parts.length >= 3){
 var colKey = parts.slice(3).join('-');
 if(r[colKey] !== undefined) r[colKey] += parseInt(impData[key]||0);
 }
 });
 r.llamTot = r.llamWF + r.llamDSGC;
 r.visOferta= r.visWF||0; r.visCap = r.visDSGC||0;
 r.impTot = r.llamTot + r.visWF + r.visDSGC + r.wp + r.marc + r.email;

}

const OD_CLIENT_ID = '9e02f283-b649-4855-b893-269f2ddff4f3';
const OD_SCOPES    = 'Files.ReadWrite User.Read offline_access';
const OD_REDIRECT  = 'http://localhost:8080/CRM_AOC_FINAL.html';
let odToken = null;
let odTokenExpiry = 0;

function odTokenValid(){
  return odToken && Date.now() < odTokenExpiry - 60000;
}

function loadStoredToken(){
  try{
    const s = JSON.parse(localStorage.getItem('crm-od-token')||'null');
    if(s && s.token && Date.now() < s.expiry - 60000){
      odToken = s.token; odTokenExpiry = s.expiry; return true;
    }
  }catch(e){}
  return false;
}

function saveToken(token, expiresIn){
  odToken = token;
  odTokenExpiry = Date.now() + expiresIn * 1000;
  localStorage.setItem('crm-od-token', JSON.stringify({token:odToken, expiry:odTokenExpiry}));
}

// PKCE helpers
function base64url(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
async function generatePKCE(){
  const verifier = base64url(crypto.getRandomValues(new Uint8Array(32)));
  const digest   = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return {verifier, challenge: base64url(digest)};
}

async function getTokenViaPopup(){
  const {verifier, challenge} = await generatePKCE();
  const state = crypto.getRandomValues(new Uint8Array(8)).join('');
  sessionStorage.setItem('od_pkce', verifier);
  sessionStorage.setItem('od_state', state);

  const redirect = 'https://ugfuniciello-star.github.io/crm-aoc/CRM_AOC_FINAL_10.html';
  const authUrl = 'https://login.microsoftonline.com/common/oauth2/v2.0/authorize'
    +'?client_id='+OD_CLIENT_ID
    +'&response_type=code'
    +'&redirect_uri='+encodeURIComponent(redirect)
    +'&scope='+encodeURIComponent(OD_SCOPES)
    +'&code_challenge='+challenge
    +'&code_challenge_method=S256'
    +'&state='+state
    +'&prompt=select_account';

  return new Promise(function(resolve, reject){
    const popup = window.open(authUrl,'MSAuth','width=500,height=650,left=300,top=100');
    if(!popup){ reject(new Error('Popup bloqueado. Permite popups.')); return; }

    const timer = setInterval(async function(){
      try{
        const url = popup.location.href;
        if(url.includes('code=') && url.includes(window.location.hostname)){
          clearInterval(timer);
          popup.close();
          const params = new URLSearchParams(new URL(url).search);
          const code = params.get('code');
          if(!code){ reject(new Error('No se recibió código')); return; }
          // Exchange code for token
          const tokenResp = await fetch('https://login.microsoftonline.com/common/oauth2/v2.0/token',{
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded'},
            body: 'client_id='+OD_CLIENT_ID
              +'&grant_type=authorization_code'
              +'&code='+code
              +'&redirect_uri='+encodeURIComponent(redirect)
              +'&code_verifier='+sessionStorage.getItem('od_pkce')
          });
          const data = await tokenResp.json();
          if(data.access_token){
            saveToken(data.access_token, data.expires_in||3600);
            resolve(data.access_token);
          } else {
            reject(new Error(data.error_description||data.error||'Error al obtener token'));
          }
        }
      }catch(e){/* cross-origin while redirecting */}
      if(popup.closed){ clearInterval(timer); reject(new Error('Login cancelado')); }
    }, 500);
  });
}

async function pollDeviceToken(deviceCode, interval, expiry){
  return new Promise(function(resolve, reject){
    const timer = setInterval(async function(){
      if(Date.now() > expiry * 1000){ clearInterval(timer); reject(new Error('Código expirado')); return; }
      try{
        const resp = await fetch('https://login.microsoftonline.com/common/oauth2/v2.0/token',{
          method:'POST',
          headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body:'grant_type=urn:ietf:params:oauth:grant-type:device_code&client_id='+OD_CLIENT_ID+'&device_code='+deviceCode
        });
        const data = await resp.json();
        if(data.access_token){
          clearInterval(timer);
          saveToken(data.access_token, data.expires_in||3600);
          resolve(data.access_token);
        } else if(data.error === 'authorization_pending'){
          // keep polling
        } else if(data.error === 'expired_token'){
          clearInterval(timer); reject(new Error('Código expirado. Vuelve a intentarlo.'));
        } else {
          clearInterval(timer); reject(new Error(data.error_description||data.error));
        }
      }catch(e){ /* network error, keep trying */ }
    }, (interval||5) * 1000);
  });
}

async function uploadToOneDrive(token){
  // Get user name
  const meResp = await fetch('https://graph.microsoft.com/v1.0/me',{headers:{Authorization:'Bearer '+token}});
  const me = await meResp.json();
  const userName = (me.displayName||me.userPrincipalName||'Comercial').replace(/[^a-zA-Z0-9]/g,'_');

  // Build Excel
  if(typeof XLSX==='undefined'){showToast('Librería Excel no cargada','err');return;}
  const wb = XLSX.utils.book_new();
  const fH=['mes','comercial','empresa','origen','fechaCreacion','fechaCierre','vencimiento',
             'contacto','telefono','email','probabilidad','ganaMes','mw','situacion',
             'proveedor','tarifa','producto','notas'];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([fH.map(h=>h.toUpperCase()),
    ...funnel.map(l=>fH.map(h=>String(l[h]||'')))]),'FUNEL DE OFERTAS');
  const vH=['mes','fechaVisita','motivo','razonSocial','cliente','poblacion','consumoAnual',
             'telefono','fechaBaja','resultado','proxAccion','notas'];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([vH.map(h=>h.toUpperCase()),
    ...visitas.map(v=>vH.map(h=>String(v[h]||'')))]),'GESTION DE VISITAS');
  const rs = buildResumenMensualSheet();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rs.rows),'RESUMEN '+rs.anio);

  const wbOut = XLSX.write(wb,{bookType:'xlsx',type:'array'});
  const blob = new Blob([wbOut],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});

  const today = new Date().toISOString().slice(0,10);
  const fileName = 'CRM_'+userName+'_'+today+'.xlsx';
  const url = 'https://graph.microsoft.com/v1.0/me/drive/root:/CRM%20AOC/'+encodeURIComponent(fileName)+':/content';

  const upResp = await fetch(url,{
    method:'PUT',
    headers:{Authorization:'Bearer '+token,
      'Content-Type':'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'},
    body:blob
  });

  if(upResp.ok){
    showToast('Guardado en OneDrive: CRM AOC/'+fileName,'ok');
  } else {
    const err = await upResp.json();
    throw new Error(err.error?.message||'Error al subir archivo');
  }
}

const POMO_WORK=25*60, POMO_BREAK=5*60;
let pomoRemaining=POMO_WORK, pomoRunning=false, pomoIsWork=true, pomoInterval=null;

function pomoTick(){
 if(pomoRemaining<=0){
 clearInterval(pomoInterval);pomoRunning=false;pomoInterval=null;
 pomoAudio(pomoIsWork?880:440);
 const ov=document.getElementById('pomoBreakOv');
 if(pomoIsWork){
 document.getElementById('pomoBreakEmoji').textContent='';
 document.getElementById('pomoBreakTitle').textContent='¡25 minutos completados!';
 document.getElementById('pomoBreakSub').textContent='Tómate 5 minutos. Hidratate, muévete, descansa la vista.';

 } else {
 document.getElementById('pomoBreakEmoji').textContent='';

 document.getElementById('pomoBreakSub').textContent='¡Vuelves a estar listo! Otro bloque de llamadas.';
 document.getElementById('pomoBreakBtn').textContent='Empezar llamadas ';
 }
 ov.classList.add('show');

 }

}

function pomoUpdateUI(){
 const total=pomoIsWork?POMO_WORK:POMO_BREAK;

 const m=Math.floor(pomoRemaining/60),s=pomoRemaining%60;
 document.getElementById('pomoTime').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
 document.getElementById('pomoPhase').textContent=pomoIsWork?'Llamadas':'Descanso';
 const arc=document.getElementById('pomoArc');
 arc.style.strokeDasharray=`${pct} 100`;
 arc.style.stroke=pomoIsWork?(pomoRemaining<=60?'var(--red)':'var(--green)'):'var(--blue)';
 document.getElementById('pomoPlayBtn').innerHTML=pomoRunning?'<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>':'<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
 document.getElementById('pomoPlayBtn').classList.toggle('run',pomoRunning);
}

function pomoToggle(){
 if(pomoRunning){clearInterval(pomoInterval);pomoRunning=false;}
 else{pomoRunning=true;pomoInterval=setInterval(pomoTick,1000);}
 pomoUpdateUI();
}

function pomoReset(){
 clearInterval(pomoInterval);pomoRunning=false;pomoInterval=null;
 pomoRemaining=POMO_WORK;pomoIsWork=true;pomoUpdateUI();
}

function pomoBreakAction(){
 document.getElementById('pomoBreakOv').classList.remove('show');

function pomoAudio(freq){
 try{
 const ctx=new (window.AudioContext||window.webkitAudioContext)();
 const o=ctx.createOscillator(),g=ctx.createGain();
 o.connect(g);g.connect(ctx.destination);
 o.frequency.value=freq;o.type='sine';
 g.gain.setValueAtTime(.4,ctx.currentTime);
 g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+1);
 o.start();o.stop(ctx.currentTime+1);
 }catch(e){}
}

function getWeekRange() {
  const now = new Date();
  const day = now.getDay() || 7;
  const mon = new Date(now); mon.setDate(now.getDate() - (day - 1)); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  return { start: mon, end: sun };
}

function getMonthRange() {
  const m = _embudoMes === -1 ? 0 : _embudoMes;
  const mEnd = _embudoMes === -1 ? 11 : _embudoMes;
  return {
    start: new Date(_embudoAno, m, 1),
    end: new Date(_embudoAno, mEnd + 1, 0, 23, 59, 59)
  };
}

function getYearRange() {
  return {
    start: new Date(2026, 0, 1),
    end: new Date(new Date().getFullYear(), 11, 31, 23, 59, 59)
  };
}

function inRange(dateStr, range) {
  if (!dateStr) return false;
  const d = new Date(dateStr);
  return !isNaN(d) && d >= range.start && d <= range.end;
}

function inRangeFunnel(l, range) {
  // Try fechaCreacion first
  if (l.fechaCreacion && inRange(l.fechaCreacion, range)) return true;
  if (l.fechaCierre && inRange(l.fechaCierre, range)) return true;
  // Parse mes field - handles "Abril 2026", "abril 2026", "2026-04-01", "2026-04-01 00:00:00"
  if (l.mes) {
    const MMAP = {enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,octubre:9,noviembre:10,diciembre:11};
    const mesStr = String(l.mes).trim();
    let mStart, mEnd;
    // Try ISO date format first: "2026-04-01" or "2026-04-01 00:00:00"
    const isoMatch = mesStr.match(/^(\d{4})-(\d{2})/);
    if (isoMatch) {
      const yr = parseInt(isoMatch[1]), mo = parseInt(isoMatch[2]) - 1;
      mStart = new Date(yr, mo, 1); mEnd = new Date(yr, mo+1, 0, 23, 59, 59);
    } else {
      // Text format: "Abril 2026"
      const parts = mesStr.toLowerCase().split(/[\s\/\-]+/);
      const mIdx = MMAP[parts[0]]; const yr = parseInt(parts[1]);
      if (mIdx !== undefined && !isNaN(yr)) {
        mStart = new Date(yr, mIdx, 1); mEnd = new Date(yr, mIdx+1, 0, 23, 59, 59);
      } else {
        // Excel serial number (e.g. 46113 = April 2026)
        const serial = parseFloat(mesStr);
        if (!isNaN(serial) && serial > 40000 && serial < 60000) {
          const d = new Date(Math.round((serial - 25569) * 86400000));
          if (!isNaN(d.getTime())) {
            mStart = new Date(d.getFullYear(), d.getMonth(), 1);
            mEnd = new Date(d.getFullYear(), d.getMonth()+1, 0, 23, 59, 59);
          }
        }
      }
    }
    if (mStart && mEnd && mStart <= range.end && mEnd >= range.start) return true;
  }
  // Last resort: if no date info at all, include in "all" ranges
  if (!l.fechaCreacion && !l.fechaCierre && !l.mes) return true;
  return false;
}

function inRangeVisita(v, range) {
  return inRange(v.fechaVisita, range);
}

function renderEmbSemana() {
  const range = getWeekRange();
  // Datos del funnel esta semana
  const fSem = funnel.filter(l => inRangeFunnel(l, range));
  const vSem = (typeof visitas !== 'undefined' ? visitas : []).filter(v => inRangeVisita(v, range));
  const mwOfer = fSem.reduce((s,l) => s + (parseFloat(l.mw)||0), 0);
  const mwFirm = fSem.filter(l=>l.situacion==='FIRMADO').reduce((s,l) => s + (parseFloat(l.mw)||0), 0);
  const psFirm = fSem.filter(l=>l.situacion==='FIRMADO').length;
  const comSem = fSem.filter(l=>l.situacion==='FIRMADO').reduce((s,l) => s + (calcCom(l.mw)||0), 0);
  const visitas_sem = vSem.length;
  const mwVis = vSem.reduce((s,v) => s + (parseFloat(v.consumoAnual||0)/1000), 0);
  const conv = mwOfer > 0 ? (mwFirm / mwOfer * 100) : 0;

  // Objetivos semanales
  const OBJ_MW_VIS = 1500, OBJ_MW_OFER = 375, OBJ_MW_FIRM = 85, OBJ_PS = 2, OBJ_COM = 300;
  const pVis = OBJ_MW_VIS > 0 ? Math.round(mwVis/OBJ_MW_VIS*100) : 0;
