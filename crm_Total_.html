  const pFirm = OBJ_MW_FIRM > 0 ? Math.round(mwFirm/OBJ_MW_FIRM*100) : 0;
  const pCom = OBJ_COM > 0 ? Math.round(comSem/OBJ_COM*100) : 0;

  // Alertas dinámicas
  let alertas = '';
  if (pVis < 80) alertas += emAlert('warn','!','Hueco en prospección', `Llevas ${Math.round(mwVis).toLocaleString('es-ES')} MW visitados — faltan ${Math.round(OBJ_MW_VIS-mwVis).toLocaleString('es-ES')} MW para el objetivo. Aumenta rutas esta semana.`);
  if (pFirm >= 100) alertas += emAlert('ok','✓','Ritmo de cierre excelente', `${Math.round(mwFirm)} MW firmados — objetivo semanal cumplido.`);
  else if (pOfer >= 100) alertas += emAlert('ok','✓','Funnel bien cargado', `${Math.round(mwOfer)} MW ofertados. Con tu tasa de conversión actual ${conv.toFixed(0)}% deberías cerrar esta semana.`);
  if (alertas === '') alertas += emAlert('warn','','Sin actividad esta semana', 'No hay registros de ofertas creadas esta semana. Asegúrate de registrar tus gestiones en el CRM.');

  document.getElementById('emb-body').innerHTML = `
    ${alertas}
    <div class="emb-krow">

function renderEmbMes() {
  const range = getMonthRange();
  const fMes = funnel.filter(l => inRangeFunnel(l, range));
  const vMes = (typeof visitas !== 'undefined' ? visitas : []).filter(v => inRangeVisita(v, range));
  const mwOfer = fMes.reduce((s,l) => s + (parseFloat(l.mw)||0), 0);
  const mwFirm = fMes.filter(l=>l.situacion==='FIRMADO').reduce((s,l) => s + (parseFloat(l.mw)||0), 0);
  const psFirm = fMes.filter(l=>l.situacion==='FIRMADO').length;
  const comMes = fMes.filter(l=>l.situacion==='FIRMADO').reduce((s,l) => s + (calcCom(l.mw)||0), 0);
  const conv = mwOfer > 0 ? (mwFirm / mwOfer * 100) : 0;
  const semAct = Math.ceil(new Date().getDate() / 7);

  const MESES_FULL2=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const mesLabel = _embudoMes===-1?'Todo el año':MESES_FULL2[_embudoMes]+' '+_embudoAno;
  const OBJ_MW_MES = 340, OBJ_COM_MES = 1083, OBJ_PS_MES = 8;
  const pFirm = Math.round(mwFirm/OBJ_MW_MES*100);

  const proyeccion = semAct > 0 ? Math.round(comMes / semAct * 4) : 0;

  let alertas = '';
  if (pFirm >= 100) alertas += emAlert('ok','✓','Objetivo mensual MW cumplido', `${Math.round(mwFirm)} MW firmados sobre ${OBJ_MW_MES} MW objetivo.`);

  document.getElementById('emb-body').innerHTML = `

      ${emKcard('PS Firmados', psFirm, 'obj. '+OBJ_PS_MES+' PS', emBadge(psFirm/OBJ_PS_MES*100))}
      ${emKcard('Comisión', comMes+'€', 'obj. '+OBJ_COM_MES+'€', emBadge(pCom))}

    </div>
    ${emFunnel([

      {lbl:'Ofertación', val: Math.round(mwOfer)+' MW', unit:'', pct: mwOfer>=1500?100:mwOfer/1500*100},

        <div class="emb-obj-item"><div class="emb-obj-lbl">Falta para objetivo</div><div class="emb-obj-num" style="color:#f87171">${comRest.toLocaleString('es-ES')} €</div><div style="font-size:10px;color:#6b8fa8">~${Math.ceil(comRest/COM_POR_CONTRATO)} contratos</div></div>
        <div class="emb-obj-item"><div class="emb-obj-lbl">Ritmo necesario</div><div class="emb-obj-num" style="color:#f5c542">${contratosMes} PS/mes</div><div style="font-size:10px;color:#6b8fa8">${contratosSem} PS/semana</div></div>

function _cmpReadForm(){
 const atr = _cmpGetSelectedAtr();
 const periods = CMP_ATR_PERIODS[atr];
 const num = id => parseFloat(document.getElementById(id).value || 0) || 0;
 const str = id => (document.getElementById(id).value || '').trim();
 // Energía
 const ene = periods.ene.map(function(p){
  const key = 'cmp_e_'+p.toLowerCase();
  return { p:p, kwh:num(key+'_kwh'), pC:num(key+'_pc'), pE:num(key+'_pe') };
 });
 // Potencia
 const pot = periods.pot.map(function(p){
  const key = 'cmp_p_'+p.toLowerCase();
  return { p:p, kw:num(key+'_kw'), pC:num(key+'_pc'), pE:num(key+'_pe') };
 });
 // Extras
 const extras = [
  {l:'Reactiva', tC:num('cmp_x_reac_c'), tE:num('cmp_x_reac_e')},
  {l:'Excesos de potencia', tC:num('cmp_x_exc_c'), tE:num('cmp_x_exc_e')},
  {l:'Alquiler equipo medida', tC:num('cmp_x_alq_c'), tE:num('cmp_x_alq_e')},
  {l:'Otros', tC:num('cmp_x_otr_c'), tE:num('cmp_x_otr_e')}
 ].filter(function(x){ return x.tC>0 || x.tE>0; });
 return {
  atr: atr,
  cliente: {
   razon: str('cmp_razon'), cif: str('cmp_cif'),
   contacto: str('cmp_contacto'), tel: str('cmp_tel'),
   email: str('cmp_email'), cups: str('cmp_cups'),
   direccion: str('cmp_direccion')
  },
  mercado: {
   pool: num('cmp_pool'), saa: num('cmp_saa'),
   fee: num('cmp_fee'), fecha: str('cmp_fecha')
  },
  ene: ene, pot: pot, extras: extras
 };
}

function _cmpWriteForm(data){
 const setV = (id,v) => { const el = document.getElementById(id); if(el && v!==undefined && v!==null) el.value = v; };
 // ATR
 const atrRadio = document.querySelector('input[name="cmp_atr"][value="'+data.atr+'"]');
 if(atrRadio){ atrRadio.checked = true; _cmpRefreshAtrUI('cmp_atr'); cmpOnAtrChange(); }
 // Cliente
 setV('cmp_razon', data.cliente.razon);
 setV('cmp_cif', data.cliente.cif);
 setV('cmp_contacto', data.cliente.contacto);
 setV('cmp_tel', data.cliente.tel);
 setV('cmp_email', data.cliente.email);
 setV('cmp_cups', data.cliente.cups);
 setV('cmp_direccion', data.cliente.direccion);
 // Mercado
 setV('cmp_pool', data.mercado.pool);
 setV('cmp_saa', data.mercado.saa);
 setV('cmp_fee', data.mercado.fee);
 setV('cmp_fecha', data.mercado.fecha);
 // Energía
 data.ene.forEach(function(e){
  const k = 'cmp_e_'+e.p.toLowerCase();
  setV(k+'_kwh', e.kwh); setV(k+'_pc', e.pC); setV(k+'_pe', e.pE);
 });
 // Potencia
 data.pot.forEach(function(p){
  const k = 'cmp_p_'+p.p.toLowerCase();
  setV(k+'_kw', p.kw); setV(k+'_pc', p.pC); setV(k+'_pe', p.pE);
 });
 // Extras
 (data.extras || []).forEach(function(x){
  const map = {'Reactiva':'reac','Excesos de potencia':'exc','Alquiler equipo medida':'alq','Otros':'otr'};
  const k = map[x.l];
  if(k){ setV('cmp_x_'+k+'_c', x.tC); setV('cmp_x_'+k+'_e', x.tE); }
 });
}

async function cmpGuardar(){
 if(!_cmpCurrentAnalysis){ showToast('Genera el análisis primero','err'); return; }
 if(!CURRENT_USER){ showToast('Necesitas identificarte como comercial','err'); return; }
 const d = _cmpCurrentAnalysis;
 try{
  if(_cmpEditingId){
   // UPDATE
   const r = await fetch(SB_URL+'/rest/v1/comparativas?id=eq.'+_cmpEditingId,{
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({cliente:d.cliente.razon, cif:d.cliente.cif, atr:d.atr, datos:d})
   });
   if(r.ok) showToast('Comparativa actualizada','ok');
   else { showToast('Error al guardar','err'); return; }
  }else{
   // INSERT
   const r = await fetch(SB_URL+'/rest/v1/comparativas',{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({comercial:CURRENT_USER, cliente:d.cliente.razon, cif:d.cliente.cif, atr:d.atr, datos:d})
   });
   if(r.ok) showToast('Comparativa guardada en tu histórico','ok');
   else { showToast('Error al guardar (¿tabla creada?)','err'); return; }
  }
  cmpHistRefresh();
 }catch(e){ showToast('Error de conexión','err'); }
}

async function cmpHistRefresh(){
 if(!CURRENT_USER){ _cmpHistCache=[]; cmpHistRender(); return; }
 try{
  const r = await fetch(SB_URL+'/rest/v1/comparativas?comercial=eq.'+encodeURIComponent(CURRENT_USER)+'&order=created_at.desc',{
   headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  _cmpHistCache = r.ok ? (await r.json()) : [];
 }catch(e){ _cmpHistCache = []; }
 const b = document.getElementById('cmpHistBadge');
 if(b) b.textContent = _cmpHistCache.length;
 cmpHistRender();
}

function cmpHistRender(){
 const list = document.getElementById('cmpHistList');
 if(!list) return;
 const q = (document.getElementById('cmpHistSearch')?.value||'').toLowerCase();
 const filtered = _cmpHistCache.filter(function(r){
  if(!q) return true;
  return (r.cliente||'').toLowerCase().indexOf(q)>=0 || (r.cif||'').toLowerCase().indexOf(q)>=0;
 });
 if(!filtered.length){
  list.innerHTML = '<div class="cmp-hist-empty">'+(q?'Sin resultados para "'+q+'"':'Aún no tienes comparativas guardadas. Genera una desde la pestaña "Nueva comparativa".')+'</div>';
  return;
 }
 list.innerHTML = filtered.map(function(r){
  const d = new Date(r.created_at);

function cmpHistOpen(id){
 const r = _cmpHistCache.find(function(x){return x.id===id;});
 if(!r) return;
 _cmpEditingId = id;
 cmpSwitch('nueva');
 _cmpWriteForm(r.datos);
 showToast('Cargada: '+r.cliente,'info');
 window.scrollTo({top:0,behavior:'smooth'});
}

async function cmpHistDelete(id){
 const r = _cmpHistCache.find(function(x){return x.id===id;});
 if(!r) return;
 if(!confirm('¿Eliminar la comparativa de '+r.cliente+'? No se puede deshacer.')) return;
 try{
  const resp = await fetch(SB_URL+'/rest/v1/comparativas?id=eq.'+id,{
   method:'DELETE',
   headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(resp.ok){ showToast('Eliminada','ok'); cmpHistRefresh(); }
  else showToast('Error al eliminar','err');
 }catch(e){ showToast('Error de conexión','err'); }
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

// ──────────────── Analysis engine (v10 adaptado a formulario) ────────────────
function _cmpBuildDashboard(d){
 const f2 = v => Math.abs(v).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
 const p4 = v => v.toFixed(4).replace('.',',');
 const eu = v => v.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
 const fkwh = v => v.toLocaleString('es-ES',{maximumFractionDigits:0});
 const MT = '#5A6878', BD = '#0E4A82', BL = '#2B6EB4', PU = '#7040C0', G = '#1D9E75', R = '#C83030';
 // Totales energía
 const tkwh = d.ene.reduce((s,e)=>s+e.kwh,0);
 let tEC=0, tEE=0;
 d.ene.forEach(function(e){ e.tC = e.kwh*e.pC; e.tE = e.kwh*e.pE; tEC+=e.tC; tEE+=e.tE; });
 const pmpC = tkwh>0 ? tEC/tkwh : 0;
 const pmpE = tkwh>0 ? tEE/tkwh : 0;
 // Totales potencia (asumimos 365 días)
 let tPC=0, tPE=0;
 d.pot.forEach(function(p){ p.tC = p.kw*p.pC*365; p.tE = p.kw*p.pE*365; tPC+=p.tC; tPE+=p.tE; });
 // Totales extras
 const tXC = d.extras.reduce((s,x)=>s+x.tC, 0);
 const tXE = d.extras.reduce((s,x)=>s+x.tE, 0);
 // Impuesto eléctrico 5.1127% sobre (energía+potencia)
 const ieC = (tEC+tPC)*0.051127, ieE = (tEE+tPE)*0.051127;
 const subtC = tEC+tPC+tXC+ieC, subtE = tEE+tPE+tXE+ieE;
 const ivaC = subtC*0.21, ivaE = subtE*0.21;
 const totC = subtC+ivaC, totE = subtE+ivaE;
 const aAn = totC-totE, aMes = aAn/12, ok = aAn>0;
 const rc = ok ? G : R;
 // Peajes ponderados
 const peajes = CMP_PEAJES[d.atr];
 const pcTot = d.ene.reduce(function(s,e){return s + e.kwh*(peajes[e.p]||0);}, 0);
 const pcKwh = tkwh>0 ? pcTot/tkwh : 0;
 const cPerd = CMP_PERDIDAS[d.atr];
 const cFnee = CMP_FNEE;
 const cPool2026 = d.mercado.pool/1000;
 const cSAA2026 = d.mercado.saa/1000;
 const cFeePromedio = d.mercado.fee/100;
 // Estructura histórica por año
 const omieStruct = CMP_OMIE_HIST.map(function(o){
  const saaY = o.saa/1000;
  const struct = o.v/1000 + saaY + pcKwh + cPerd + cFnee;
  return {y:o.y, struct:struct, total:struct+cFeePromedio};
 });
 const totalAvg = omieStruct.reduce((s,o)=>s+o.total,0)/omieStruct.length;
 const totalMax = Math.max.apply(Math, omieStruct.map(o=>o.total));
 // Build-up 2026
 const cEstruct2026 = cPool2026+cSAA2026+pcKwh+cPerd+cFnee;
 const cMinComp = cEstruct2026 + cFeePromedio;
 const mgActual = pmpC-cMinComp, mgEndesa = pmpE-cMinComp;
 const chartMaxKwh = Math.max(totalMax, pmpC, pmpE, totalAvg)*1.12;
 const buMax = Math.max(cMinComp, pmpC, pmpE)*1.15;

 // ===== PORTADA =====
 const fechaTx = d.mercado.fecha ? new Date(d.mercado.fecha).toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'}) : new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'});
 let html = '<div class="cmp-dash">';
 html += '<div class="sec"><div class="sb">Estudio Comparativo · '+escapeHtml(d.cliente.razon)+'</div><div class="sbody">';
 html += '<div style="margin-bottom:14px"><div style="font-size:9px;color:'+MT+';text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px">Cliente</div><div style="font-size:18px;font-weight:700;color:#1A2B3C">'+escapeHtml(d.cliente.razon)+'</div><div style="font-size:11px;color:'+MT+';margin-top:2px">CIF: '+escapeHtml(d.cliente.cif||'—')+' · Tarifa: '+d.atr+' · '+fechaTx+'</div></div>';
 html += '<div class="cmp-head-2col">';
 html += '<div class="cmp-head-card"><div class="t">PMP Actual</div><div class="v">'+p4(pmpC)+' €/kWh</div></div>';
 html += '<div class="cmp-head-card"><div class="t">PMP Endesa</div><div class="v">'+p4(pmpE)+' €/kWh</div></div>';
 html += '<div class="cmp-head-card '+(ok?'ok':'bad')+'"><div class="t">Ahorro anual</div><div class="v">'+(ok?'+':'')+eu(Math.abs(aAn))+'</div></div>';
 html += '</div>';
 if(d.cliente.contacto || d.cliente.direccion){
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;font-size:11px;color:'+MT+'">';
  if(d.cliente.contacto) html += '<div><b style="color:#1A2B3C">Contacto:</b> '+escapeHtml(d.cliente.contacto)+(d.cliente.tel?' · '+escapeHtml(d.cliente.tel):'')+'</div>';
  if(d.cliente.email) html += '<div><b style="color:#1A2B3C">Email:</b> '+escapeHtml(d.cliente.email)+'</div>';
  if(d.cliente.direccion) html += '<div style="grid-column:1/-1"><b style="color:#1A2B3C">Suministro:</b> '+escapeHtml(d.cliente.direccion)+(d.cliente.cups?' · CUPS '+escapeHtml(d.cliente.cups):'')+'</div>';
  html += '</div>';
 }
 html += '</div></div>';

 // ===== COMPARATIVA =====
 html += '<div class="sec"><div class="sb">Comparativa económica anual</div><div class="sbody">';
 // Tabla potencia
 html += '<table class="dt-tbl" style="margin-bottom:10px"><thead><tr><th>Potencia</th><th>kW</th><th style="text-align:right">Actual €/kW·día</th><th style="text-align:right">Endesa €/kW·día</th><th style="text-align:right">Total actual</th><th style="text-align:right">Total Endesa</th></tr></thead><tbody>';
 d.pot.forEach(function(p){
  html += '<tr><td><b>'+p.p+'</b></td><td>'+f2(p.kw)+' kW</td><td class="n">'+p4(p.pC)+'</td><td class="n">'+p4(p.pE)+'</td><td class="n">'+eu(p.tC)+'</td><td class="n">'+eu(p.tE)+'</td></tr>';
 });
 html += '<tr class="tot"><td colspan="4">Subtotal potencia</td><td class="n">'+eu(tPC)+'</td><td class="n">'+eu(tPE)+'</td></tr>';
 html += '</tbody></table>';
 // Tabla energía
 html += '<table class="dt-tbl" style="margin-bottom:10px"><thead><tr><th>Energía</th><th>kWh/año</th><th style="text-align:right">Actual €/kWh</th><th style="text-align:right">Endesa €/kWh</th><th style="text-align:right">Total actual</th><th style="text-align:right">Total Endesa</th></tr></thead><tbody>';
 d.ene.forEach(function(e){
  html += '<tr><td><b>'+e.p+'</b></td><td>'+fkwh(e.kwh)+' kWh</td><td class="n">'+p4(e.pC)+'</td><td class="n">'+p4(e.pE)+'</td><td class="n">'+eu(e.tC)+'</td><td class="n">'+eu(e.tE)+'</td></tr>';
 });
 html += '<tr class="tot"><td>PMP</td><td class="n">'+fkwh(tkwh)+'</td><td class="n">'+p4(pmpC)+'</td><td class="n">'+p4(pmpE)+'</td><td class="n">'+eu(tEC)+'</td><td class="n">'+eu(tEE)+'</td></tr>';
 html += '</tbody></table>';
 // Extras
 if(d.extras.length){
  html += '<table class="dt-tbl" style="margin-bottom:10px"><thead><tr><th>Otros conceptos</th><th></th><th></th><th></th><th style="text-align:right">Actual</th><th style="text-align:right">Endesa</th></tr></thead><tbody>';
  d.extras.forEach(function(x){
   html += '<tr><td colspan="4">'+escapeHtml(x.l)+'</td><td class="n">'+(x.tC>0?eu(x.tC):'—')+'</td><td class="n">'+(x.tE>0?eu(x.tE):'—')+'</td></tr>';
  });
  html += '</tbody></table>';
 }
 // Subtotales IE + IVA
 html += '<table class="dt-tbl"><tbody>';
 html += '<tr><td colspan="4">Impuesto eléctrico (5,1127 %)</td><td class="n">'+eu(ieC)+'</td><td class="n">'+eu(ieE)+'</td></tr>';
 html += '<tr><td colspan="4">Subtotal</td><td class="n">'+eu(subtC)+'</td><td class="n">'+eu(subtE)+'</td></tr>';
 html += '<tr><td colspan="4">IVA (21 %)</td><td class="n">'+eu(ivaC)+'</td><td class="n">'+eu(ivaE)+'</td></tr>';
 html += '<tr class="tot"><td colspan="4">TOTAL ANUAL</td><td class="n">'+eu(totC)+'</td><td class="n">'+eu(totE)+'</td></tr>';
 html += '<tr class="'+(ok?'tot':'')+'" style="background:'+(ok?'#EAF5EB':'#FDEAEA')+';color:'+rc+';font-weight:700"><td colspan="4">'+(ok?'✓ Ahorro anual con Endesa':'✘ Endesa más caro')+'</td><td class="n" style="color:'+rc+'">'+(ok?'+':'')+eu(Math.abs(aAn))+'</td><td class="n" style="color:'+rc+'">'+(ok?'+':'')+eu(Math.abs(aMes))+'/mes</td></tr>';
 html += '</tbody></table>';
 html += '</div></div>';

 // ===== ANÁLISIS =====
 const omieBars = omieStruct.map(function(o){
  const h = Math.round(o.total/chartMaxKwh*100);
  return '<div class="omie-bar"><span class="val">'+p4(o.total)+'</span><div class="bar" style="height:'+h+'%"></div><span class="yr">'+o.y+'</span></div>';
 }).join('');
 const reflineData = [
  {val: totalAvg, color: MT, label: 'Media 5 años'},
  {val: pmpC, color: PU, label: 'PMP actual'},
  {val: pmpE, color: BL, label: 'PMP Endesa'}
 ];
 const omieReflines = reflineData.map(function(r){
  const pos = 100 - (r.val/chartMaxKwh*100);
  return '<div class="refline" style="top:'+pos.toFixed(2)+'%;border-color:'+r.color+'"></div>';
 }).join('');
 const chartLegend = '<div class="chart-legend">' +
  reflineData.map(function(r){
   return '<span class="leg-item" style="color:'+r.color+'"><i style="border-top-color:'+r.color+'"></i>'+r.label+' · '+p4(r.val)+' €/kWh</span>';
  }).join('') + '</div>';

 function bupRow(lb, val, color, isTot){

 }

 const mgEndesaBg = mgEndesa>=0?'#EAF5EB':'#FDEAEA';

 html += '<div class="an-sec"><table class="buildup-tbl">';

 html += bupRow('Pool OMIE YTD 2026', cPool2026, '#888780', false);
 html += bupRow('Peajes + cargos '+d.atr+' · ponderado', pcKwh, '#378ADD', false);
 html += bupRow('SAA · servicios de ajuste 2026 YTD', cSAA2026, '#85B7EB', false);
 html += bupRow('Pérdidas '+d.atr, cPerd, '#B5D4F4', false);
 html += bupRow('FNEE', cFnee, '#D8E8F5', false);
 html += bupRow('Coste estructural total 2026', cEstruct2026, BD, true);
 html += '<tr><td colspan="4" style="height:6px;border:none"></td></tr>';
 html += '<tr><td colspan="4" style="font-size:9px;color:'+BL+';font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:7px 10px 3px">Fee promedio comercializadora</td></tr>';
 html += bupRow('Fee promedio comercializadora', cFeePromedio, '#1D9E75', false);
 html += bupRow('Precio estándar competitivo', cMinComp, '#27500A', true);
 html += '<tr><td colspan="4" style="height:6px;border:none"></td></tr>';
 html += '<tr><td colspan="4" style="font-size:9px;color:'+BL+';font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:7px 10px 3px">PMP frente al precio estándar</td></tr>';
 html += bupRow('PMP tarifa actual', pmpC, PU, false);
 html += bupRow('PMP oferta Endesa', pmpE, BL, false);
 html += '</table>';
 html += '<div class="margin-cmp">';
 html += '<div class="mb" style="background:'+mgActualBg+';border-color:'+mgActualColor+'"><div class="t" style="color:'+PU+'">Posición · tarifa actual</div><div class="pmp" style="color:'+PU+'">'+p4(pmpC)+' €/kWh</div><div class="mg" style="color:'+mgActualColor+'">'+(mgActual>=0?'+':'')+p4(mgActual)+' €/kWh vs. estándar</div><div class="nt">'+(mgActual<0?'PMP por debajo del precio estándar. La comercializadora trabaja con fee reducido o cobertura previa.':'PMP por encima del precio estándar de mercado.')+'</div></div>';

 html += '</div></div></div></div>';

 // Lectura comercial
 const struct2022_total = omieStruct[1].total;

const PEN_ATR_DESC = {
 '2.0TD': '2.0TD · Residencial / pyme pequeña (potencia ≤15 kW)',
 '3.0TD': '3.0TD · Baja tensión con potencia >15 kW',
 '6.1TD': '6.1TD · Alta tensión (1 kV < V < 30 kV)'
};
const PEN_PCT_DEFAULT = { '2.0TD':5, '3.0TD':5, '6.1TD':5 };

function penOnAtrChange(){
 _cmpRefreshAtrUI('pen_atr');
 const r = document.querySelector('input[name="pen_atr"]:checked');
 const v = r ? r.value : '2.0TD';
 document.getElementById('pen_atr_info').textContent = PEN_ATR_DESC[v];
 // set default pct
 const pct = PEN_PCT_DEFAULT[v];
 const pr = document.querySelector('input[name="pen_pct"][value="'+pct+'"]');
 if(pr){ pr.checked = true; penSetPct(pct); }
}

function penCalcDias(){
 const fa = document.getElementById('pen_fa').value;
 const fb = document.getElementById('pen_fb').value;
 const chip = document.getElementById('pen_chip');
 const txt = document.getElementById('pen_chip_txt');
 if(!fa || !fb){ chip.style.display='none'; return; }
 const da = new Date(fa), db = new Date(fb);
 if(db<=da){ chip.style.display='none'; return; }
 const dias = Math.round((db-da)/86400000);
 const meses = Math.floor(dias/30.44);
 txt.textContent = dias+' días restantes (~'+meses+' meses)';
 chip.style.display='inline-flex';
}

function penSetPct(p){
 document.getElementById('pen_pct_big').textContent = p+' %';
}

function penCalcular(){
 const err = document.getElementById('pen_err');
 err.textContent = '';
 const fa = document.getElementById('pen_fa').value;
 const fb = document.getElementById('pen_fb').value;
 const consumo = parseFloat(document.getElementById('pen_consumo').value);
 const precio = parseFloat(document.getElementById('pen_precio').value);
 const pctR = document.querySelector('input[name="pen_pct"]:checked');
 if(!fa || !fb){ err.textContent = 'Completa ambas fechas.'; return; }
 const da = new Date(fa), db = new Date(fb);
 if(db<=da){ err.textContent = 'La fecha de fin debe ser posterior a la fecha vigente.'; return; }
 if(!(consumo>0)){ err.textContent = 'Introduce el consumo anual estimado.'; return; }
 if(!(precio>0)){ err.textContent = 'Introduce el precio base (>0).'; return; }
 if(!pctR){ err.textContent = 'Selecciona el porcentaje de penalización.'; return; }
 const dias = Math.round((db-da)/86400000);
 const consumoProp = consumo * (dias/365);
 const penSIva = consumoProp * precio * (parseFloat(pctR.value)/100);
 const penTot = penSIva * 1.21;
 document.getElementById('pen_r_fa').textContent = da.toLocaleDateString('es-ES');
 document.getElementById('pen_r_fb').textContent = db.toLocaleDateString('es-ES');
 document.getElementById('pen_r_dias').textContent = dias;
 document.getElementById('pen_r_siva').textContent = penSIva.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
 document.getElementById('pen_r_total').textContent = penTot.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
 document.getElementById('pen_res').style.display = '';
 document.getElementById('pen_res').scrollIntoView({behavior:'smooth',block:'center'});
}

  }
 };
})();

</script>
