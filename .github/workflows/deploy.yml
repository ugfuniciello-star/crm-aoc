name: Deploy CRM AOC
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject token and deploy via API
        run: |
          # Generate the HTML with token injected
          sed "s|%%GIST_TOKEN%%|${GIST_TOKEN}|g" index.html > deployed.html
          
          # Get current file SHA from gh-pages
          SHA=$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/ugfuniciello-star/crm-aoc/contents/index.html?ref=gh-pages" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))")
          
          echo "Current SHA: $SHA"
          
          # Base64 encode the file
          CONTENT=$(base64 -w 0 deployed.html)
          
          # Update file via API
          curl -s -X PUT \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/ugfuniciello-star/crm-aoc/contents/index.html" \
            -d "{\"message\":\"Deploy CRM AOC\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\",\"branch\":\"gh-pages\"}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK:', d.get('commit',{}).get('sha','ERROR'))"
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
