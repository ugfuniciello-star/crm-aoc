name: Deploy CRM AOC
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject token into HTML
        run: |
          mkdir -p dist
          sed "s|%%GIST_TOKEN%%|${GIST_TOKEN}|g" index.html > dist/index.html
          touch dist/.nojekyll
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Deploy to gh-pages
        run: |
          cd dist
          git init
          git add -A
          git commit -m "Deploy CRM AOC"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ugfuniciello-star/crm-aoc.git" HEAD:gh-pages
