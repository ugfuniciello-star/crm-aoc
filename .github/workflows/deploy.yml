name: Deploy CRM AOC
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject token
        run: |
          mkdir -p dist
          sed "s|%%GIST_TOKEN%%|${GIST_TOKEN}|g" index.html > dist/index.html
          cp .nojekyll dist/.nojekyll
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
