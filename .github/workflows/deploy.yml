name: Deploy CRM AOC
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Inject token
        run: |
          sed "s|%%GIST_TOKEN%%|${GIST_TOKEN}|g" index.html > index_deployed.html
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: Checkout gh-pages and deploy
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin gh-pages
          git checkout gh-pages
          cp index_deployed.html index.html
          git add index.html
          git diff --staged --quiet || git commit -m "Deploy $(date)"
          git push origin gh-pages
